<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CWT Dashboard</title>
<style>
  :root {
    --bg: #0a0b0e;
    --panel: rgba(255, 255, 255, .03);
    --panel-2: rgba(255, 255, 255, .045);
    --line: rgba(255, 255, 255, .06);
    --fg: #eef0f5;
    --dim: #7d8496;
    --amber: #f5a524;
    --amber-soft: rgba(245, 165, 36, .11);
    --green: #34d399;
    --green-soft: rgba(52, 211, 153, .11);
    --red: #f87171;
    --red-soft: rgba(248, 113, 113, .11);
    --radius: 24px;
    --radius-sm: 14px;
    --ease: cubic-bezier(.16, 1, .3, 1);
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--fg); font: 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; -webkit-font-smoothing: antialiased; }
  /* Soft drifting glow — the only ambient motion. Full-viewport, behind everything. */
  body::before {
    content: "";
    position: fixed;
    inset: -30%;
    background:
      radial-gradient(35% 35% at 20% 30%, rgba(245, 165, 36, .10), transparent 60%),
      radial-gradient(30% 30% at 80% 65%, rgba(52, 211, 153, .06), transparent 60%),
      radial-gradient(40% 40% at 50% 90%, rgba(99, 102, 241, .05), transparent 60%);
    filter: blur(20px);
    z-index: -1;
    animation: drift 24s var(--ease) infinite alternate;
    will-change: transform;
    pointer-events: none;
  }
  @keyframes drift {
    0%   { transform: translate3d(0, 0, 0) scale(1); }
    50%  { transform: translate3d(3%, -2%, 0) scale(1.08); }
    100% { transform: translate3d(-2%, 3%, 0) scale(1.02); }
  }
  @media (prefers-reduced-motion: reduce) {
    body::before { animation: none; }
  }
  body { padding: 40px 44px 80px; max-width: 1100px; margin: 0 auto; position: relative; }
  header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 28px; }
  h1 { font-size: 22px; font-weight: 600; margin: 0; letter-spacing: -.01em; }
  h1 .accent { color: var(--amber); }
  .sub { color: var(--dim); font-size: 13px; margin-top: 4px; }
  .stats { display: flex; gap: 10px; font-size: 12px; }
  .stat { background: var(--panel); backdrop-filter: blur(10px); padding: 10px 16px; border-radius: 14px; display: flex; flex-direction: column; gap: 2px; min-width: 72px; transition: transform .25s var(--ease); }
  .stat:hover { transform: translateY(-1px); }
  .stat-v { font-family: var(--mono); font-size: 19px; font-weight: 600; }
  .stat-l { color: var(--dim); font-size: 10px; text-transform: uppercase; letter-spacing: .06em; }
  .stat.pending .stat-v { color: var(--amber); }
  .stat.approved .stat-v { color: var(--green); }
  .stat.rejected .stat-v { color: var(--red); }
  .tabs { display: flex; gap: 2px; margin-bottom: 22px; }
  .tab { background: transparent; color: var(--dim); border: none; padding: 10px 18px; font-size: 13px; cursor: pointer; font-family: inherit; border-radius: 99px; transition: background .2s var(--ease), color .2s var(--ease); }
  .tab.active { color: var(--fg); background: var(--panel-2); }
  .tab:hover:not(.active) { color: var(--fg); }
  .card { background: var(--panel); backdrop-filter: blur(12px); border-radius: var(--radius); padding: 24px 26px; margin-bottom: 14px; transition: transform .3s var(--ease), background .3s var(--ease); }
  .card:hover { background: var(--panel-2); }
  .card.pending { box-shadow: inset 3px 0 0 rgba(245, 165, 36, .6); }
  .card.approved { box-shadow: inset 3px 0 0 rgba(52, 211, 153, .6); }
  .card.rejected { box-shadow: inset 3px 0 0 rgba(248, 113, 113, .5); opacity: .7; }
  .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 12px; }
  .plan-id { font-family: var(--mono); font-size: 12px; color: var(--dim); }
  .plan-summary { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .pill { font-size: 11px; padding: 3px 10px; border-radius: 99px; background: var(--panel-2); color: var(--dim); font-weight: 500; letter-spacing: .02em; text-transform: uppercase; }
  .pill.pending { background: var(--amber-soft); color: var(--amber); border-color: transparent; }
  .pill.approved { background: var(--green-soft); color: var(--green); border-color: transparent; }
  .pill.rejected { background: var(--red-soft); color: var(--red); border-color: transparent; }
  .targets { margin: 14px 0; padding: 0; list-style: none; }
  .target { background: var(--panel-2); border-radius: var(--radius-sm); padding: 12px 16px; margin-bottom: 6px; font-size: 13px; }
  .target-path { font-family: var(--mono); color: var(--fg); font-weight: 600; }
  .target-op { display: inline-block; font-family: var(--mono); font-size: 10px; padding: 1px 6px; border-radius: 4px; background: var(--line); color: var(--dim); margin-right: 8px; text-transform: uppercase; }
  .target-op.create { background: var(--green-soft); color: var(--green); }
  .target-op.edit { background: var(--amber-soft); color: var(--amber); }
  .target-op.delete { background: var(--red-soft); color: var(--red); }
  .target-why { color: var(--dim); font-size: 12px; margin-top: 4px; font-style: italic; }
  .actions { display: flex; gap: 8px; margin-top: 16px; }
  .btn { background: var(--panel-2); color: var(--fg); border: none; padding: 10px 20px; border-radius: 999px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: transform .2s var(--ease), background .2s var(--ease); }
  .btn:hover { transform: translateY(-1px); }
  .btn.approve { color: var(--green); background: var(--green-soft); }
  .btn.approve:hover { background: rgba(52, 211, 153, .22); }
  .btn.reject { color: var(--red); background: var(--red-soft); }
  .btn.reject:hover { background: rgba(248, 113, 113, .22); }
  .empty { color: var(--dim); text-align: center; padding: 48px 20px; font-size: 14px; }
  .empty code { background: var(--panel); padding: 2px 8px; border-radius: 4px; font-size: 12px; }
  .manifest-box { background: rgba(0, 0, 0, .35); backdrop-filter: blur(12px); border-radius: var(--radius-sm); padding: 18px 22px; margin-top: 32px; font-family: var(--mono); font-size: 12px; }
  .manifest-box h3 { margin: 0 0 8px; font-size: 12px; color: var(--dim); text-transform: uppercase; letter-spacing: .06em; font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-weight: 500; }
  .manifest-box pre { margin: 0; white-space: pre-wrap; word-break: break-word; color: var(--fg); }
  .refresh { position: fixed; bottom: 24px; right: 24px; background: var(--amber); color: #000; border: none; padding: 12px 20px; border-radius: 99px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; box-shadow: 0 12px 36px rgba(245, 165, 36, .35); transition: transform .2s var(--ease), box-shadow .3s var(--ease); animation: hover-float 6s ease-in-out infinite; }
  .refresh:hover { transform: translateY(-2px); box-shadow: 0 18px 48px rgba(245, 165, 36, .5); }
  @keyframes hover-float {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-3px); }
  }
  @media (prefers-reduced-motion: reduce) { .refresh { animation: none; } }
  .head-right { display: flex; gap: 8px; align-items: center; }
  .score { font-family: var(--mono); font-size: 11px; padding: 3px 10px; border-radius: 99px; font-weight: 700; letter-spacing: .02em; }
  .score.high { background: var(--green-soft); color: var(--green); }
  .score.mid { background: var(--amber-soft); color: var(--amber); }
  .score.low { background: var(--red-soft); color: var(--red); }
  .score.exempt { background: var(--panel-2); color: var(--dim); border: 1px solid var(--line); font-weight: 500; text-transform: uppercase; font-size: 10px; letter-spacing: .06em; }
  .target-ratings { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 6px; font-size: 11px; }
  .target-score { font-family: var(--mono); font-size: 10px; padding: 1px 7px; border-radius: 4px; font-weight: 700; }
  .target-score.high { background: var(--green-soft); color: var(--green); }
  .target-score.mid { background: var(--amber-soft); color: var(--amber); }
  .target-score.low { background: var(--red-soft); color: var(--red); }
  .target-score.exempt { background: var(--panel-2); color: var(--dim); font-weight: 500; text-transform: uppercase; }
  .rule-list { color: var(--dim); font-family: var(--mono); font-size: 10px; }
  .rule-list .cited { color: var(--green); }
  .rule-list .uncited { color: var(--red); }
  .task-row { display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: var(--panel); backdrop-filter: blur(10px); border-radius: var(--radius-sm); margin-bottom: 6px; font-size: 13px; transition: transform .25s var(--ease); }
  .task-row:hover { transform: translateX(2px); }
  .task-id { font-family: var(--mono); color: var(--dim); font-size: 11px; min-width: 50px; }
  .task-title { flex: 1; }
  .task-owner { font-family: var(--mono); font-size: 11px; color: var(--amber); }
  .task-status { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
  .task-status.done { background: var(--green-soft); color: var(--green); }
  .task-status.in-progress { background: var(--amber-soft); color: var(--amber); }
  .task-status.todo { background: var(--panel-2); color: var(--dim); }
  .task-status.blocked { background: var(--red-soft); color: var(--red); }
  .task-deps { font-family: var(--mono); font-size: 10px; color: var(--dim); }
  .graph-file { background: var(--panel); backdrop-filter: blur(10px); border-radius: var(--radius-sm); padding: 14px 18px; margin-bottom: 6px; transition: transform .25s var(--ease); }
  .graph-file:hover { transform: translateX(2px); }
  .graph-file.plan-pending { border-left: 3px solid var(--amber); }
  .graph-file.plan-approved { border-left: 3px solid var(--green); }
  .graph-file.plan-rejected { border-left: 3px solid var(--red); opacity: .75; }
  .plan-badge { font-family: var(--mono); font-size: 10px; padding: 2px 6px; border-radius: 99px; font-weight: 600; letter-spacing: .02em; }
  .plan-badge.pending { background: var(--amber-soft); color: var(--amber); }
  .plan-badge.approved { background: var(--green-soft); color: var(--green); }
  .plan-badge.rejected { background: var(--red-soft); color: var(--red); }
  .graph-file-head { display: flex; justify-content: space-between; align-items: center; font-family: var(--mono); font-size: 12px; }
  .graph-file-path { color: var(--fg); }
  .graph-file-tool { font-size: 10px; padding: 1px 6px; border-radius: 4px; background: var(--panel-2); color: var(--dim); text-transform: uppercase; }
  .graph-imports { margin: 6px 0 0 0; padding-left: 16px; color: var(--dim); font-family: var(--mono); font-size: 11px; }
  .graph-imports li { list-style: "→ "; }
  .panel-stats { display: flex; gap: 18px; margin-bottom: 14px; color: var(--dim); font-size: 12px; }
  .panel-stats .v { color: var(--fg); font-family: var(--mono); font-weight: 600; }
  .launch-claude { background: var(--amber); color: #000; border: none; padding: 10px 20px; border-radius: 999px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; letter-spacing: .02em; transition: transform .2s var(--ease), box-shadow .3s var(--ease); }
  .launch-claude:hover { transform: translateY(-1px); box-shadow: 0 10px 30px rgba(245, 165, 36, .35); }
  .launch-claude:active { transform: translateY(0); }
  .toast { position: fixed; bottom: 80px; right: 20px; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 12px 18px; font-size: 13px; color: var(--fg); box-shadow: 0 8px 32px rgba(0,0,0,.4); opacity: 0; transform: translateY(10px); transition: opacity .2s, transform .2s; pointer-events: none; max-width: 320px; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { border-color: var(--red); }
  .toast.ok { border-color: var(--green); }
  .onboard { background: var(--panel); backdrop-filter: blur(14px); border-radius: var(--radius); padding: 40px 44px; margin: 28px 0; }
  .onboard h2 { margin: 0 0 4px; font-size: 18px; font-weight: 600; color: var(--fg); letter-spacing: -.01em; }
  .onboard .lede { color: var(--dim); font-size: 13px; margin-bottom: 22px; }
  .onboard ol { margin: 0; padding: 0 0 0 20px; color: var(--fg); font-size: 14px; line-height: 1.8; }
  .onboard ol li::marker { color: var(--amber); font-weight: 700; }
  .onboard ol li { margin-bottom: 6px; }
  .onboard code { background: var(--panel-2); padding: 2px 8px; border-radius: 4px; font-size: 12px; font-family: var(--mono); color: var(--fg); }
  .composer { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--line); }
  .composer-label { color: var(--dim); font-size: 12px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .06em; }
  .composer textarea { width: 100%; background: var(--panel-2); border: none; border-radius: var(--radius-sm); padding: 14px 16px; color: var(--fg); font-family: inherit; font-size: 13px; resize: vertical; min-height: 60px; box-sizing: border-box; transition: background .2s var(--ease), box-shadow .2s var(--ease); }
  .composer textarea:focus { outline: none; background: rgba(255, 255, 255, .06); box-shadow: 0 0 0 2px rgba(245, 165, 36, .4); }
  .composer-row { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
  .composer-hint { color: var(--dim); font-size: 11px; flex: 1; }
  .composer-btn { background: var(--amber); color: #000; border: none; padding: 12px 20px; border-radius: 999px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; transition: transform .2s var(--ease), box-shadow .3s var(--ease); }
  .composer-btn:hover { transform: translateY(-1px); box-shadow: 0 10px 30px rgba(245, 165, 36, .35); }
  .composer-btn:active { transform: translateY(0); }
  .info-icon { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: var(--line); color: var(--dim); text-align: center; font-size: 9px; line-height: 12px; cursor: help; margin-left: 4px; font-weight: 600; }
  .plain-summary { background: var(--panel-2); border-radius: var(--radius-sm); padding: 14px 18px; margin: 10px 0 14px; font-size: 14px; line-height: 1.6; color: var(--fg); }
  .plain-summary-label { color: var(--dim); font-size: 10px; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; font-weight: 600; }
  .plain-summary-loading { color: var(--dim); font-style: italic; font-size: 13px; }
  .plain-summary-unavailable { color: var(--dim); font-size: 12px; font-style: italic; }
  .details-toggle { background: transparent; color: var(--dim); border: none; padding: 6px 0 0; font-size: 11px; font-family: inherit; cursor: pointer; letter-spacing: .04em; }
  .details-toggle:hover { color: var(--amber); }
  .tech-details { display: none; margin-top: 8px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,.04); }
  .tech-details.open { display: block; }
  /* Simple-mode hides the technical chrome when there are no plans yet */
  body.simple-mode .stats,
  body.simple-mode .tabs,
  body.simple-mode .manifest-box,
  body.simple-mode .sub { display: none; }
  body.simple-mode .onboard ol { display: none; }
  body.simple-mode .onboard .composer { border-top: none; padding-top: 0; margin-top: 0; }
  body.simple-mode h1 { font-size: 28px; }
  body.simple-mode .launch-claude { display: none; }
  body.simple-mode .onboard { padding: 36px 40px; margin-top: 32px; }
  body.simple-mode .onboard h2 { font-size: 22px; }
  body.simple-mode .onboard textarea { min-height: 120px; font-size: 15px; padding: 14px 16px; }
  body.simple-mode .composer-btn { font-size: 14px; padding: 12px 20px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>CWT <span class="accent">Dashboard</span></h1>
    <div class="sub">Review what the App Maker wants to build — approve what's safe, reject what's wrong.</div>
  </div>
  <div class="stats">
    <div class="stat pending"><span class="stat-v" id="ct-pending">0</span><span class="stat-l">Pending</span></div>
    <div class="stat approved"><span class="stat-v" id="ct-approved">0</span><span class="stat-l">Approved</span></div>
    <div class="stat rejected"><span class="stat-v" id="ct-rejected">0</span><span class="stat-l">Rejected</span></div>
    <button class="launch-claude" onclick="launchClaude()" title="Open the App Maker (a new terminal tab in this project, ready to build)">▶ Open App Maker</button>
  </div>
</header>
<div id="toast" class="toast"></div>

<div class="tabs">
  <button class="tab active" data-filter="pending">Pending</button>
  <button class="tab" data-filter="approved">Approved</button>
  <button class="tab" data-filter="rejected">Rejected</button>
  <button class="tab" data-filter="all">All</button>
  <button class="tab" data-filter="tasks">Tasks</button>
  <button class="tab" data-filter="graph">Graph</button>
</div>

<div id="plans"></div>
<div id="tasks-panel" style="display:none;"></div>
<div id="graph-panel" style="display:none;"></div>

<div class="manifest-box">
  <h3>Current approved manifest (what the hook enforces)</h3>
  <pre id="manifest">loading…</pre>
</div>

<button class="refresh" onclick="refresh()">↻ Refresh</button>

<script>
let PLANS = [];
let FILTER = "pending";
let COMPOSER_VALUE = "";
const CATCH_ALL = new Set(["collaboration", "routing", "rooms", "branching"]);

// Keep the composer value in a module var so it survives any DOM wipe.
// Delegated listener attached once on DOMContentLoaded.
function _syncComposer(e) {
  if (e.target && e.target.id === "composer-input") COMPOSER_VALUE = e.target.value;
}
document.addEventListener("input", _syncComposer);

function scoreClass(score) {
  if (score === null || score === undefined) return "exempt";
  if (score >= 80) return "high";
  if (score >= 50) return "mid";
  return "low";
}

function overallScoreHtml(ratings) {
  if (!ratings) return "";
  const s = ratings.overall;
  if (s === null || s === undefined) return `<span class="score exempt" title="All targets are CWT tooling, exempt from app architecture rules">exempt</span>`;
  return `<span class="score ${scoreClass(s)}" title="Architecture score (0-100). Higher = more rules cited in the plan's justifications. Low scores mean the plan may skip layers or skip citations.">${s}</span>`;
}

function targetRatingHtml(tr) {
  if (!tr) return "";
  const scoreBadge = tr.exempt
    ? `<span class="target-score exempt" title="CWT tooling — rules don't apply">exempt</span>`
    : `<span class="target-score ${scoreClass(tr.score)}">${tr.score}</span>`;
  let ruleHtml = "";
  if (!tr.exempt) {
    const applicable = (tr.applicable || []).filter(r => !CATCH_ALL.has(r));
    const cited = (tr.cited || []).filter(r => !CATCH_ALL.has(r));
    const missing = applicable.filter(r => !cited.includes(r));
    const parts = [];
    if (cited.length) parts.push(`<span class="cited" title="Rules this plan's justification references — shown as evidence the plan respects them">cites: ${cited.join(", ")}</span>`);
    if (missing.length) parts.push(`<span class="uncited" title="Rules that apply to this file but the plan didn't cite — may indicate skipped checks">missing: ${missing.join(", ")}</span>`);
    if (!applicable.length) parts.push(`<span>no specific rules apply</span>`);
    ruleHtml = `<span class="rule-list">${parts.join(" · ")}</span>`;
  }
  return `<div class="target-ratings">${scoreBadge}${ruleHtml}</div>`;
}

let TASKS = null;
let GRAPH = null;

async function refresh() {
  const [plansRes, manifestRes, tasksRes, graphRes] = await Promise.all([
    fetch("/api/plans").then(r => r.json()).catch(() => ({plans: []})),
    fetch("/api/manifest").then(r => r.json()).catch(() => ({})),
    fetch("/api/tasks").then(r => r.json()).catch(() => null),
    fetch("/api/graph").then(r => r.json()).catch(() => null),
  ]);
  PLANS = plansRes.plans || [];
  TASKS = tasksRes;
  GRAPH = graphRes;
  document.getElementById("ct-pending").textContent = PLANS.filter(p => p._status === "pending").length;
  document.getElementById("ct-approved").textContent = PLANS.filter(p => p._status === "approved").length;
  document.getElementById("ct-rejected").textContent = PLANS.filter(p => p._status === "rejected").length;
  document.getElementById("manifest").textContent = JSON.stringify(manifestRes, null, 2);
  // Simple-mode: strip stats/tabs/manifest until at least one plan exists
  if (PLANS.length === 0) {
    document.body.classList.add("simple-mode");
    FILTER = "pending";
  } else {
    document.body.classList.remove("simple-mode");
  }
  render();
  if (PLANS.length > 0 && FILTER !== "tasks" && FILTER !== "graph") {
    fetchPlainSummaries();
  }
}

function renderTasks() {
  const el = document.getElementById("tasks-panel");
  if (!TASKS || !TASKS.tasks || !TASKS.tasks.length) {
    el.innerHTML = `<div class="empty">No tasks. Drop a JSON file into <code>.cwt/tasks/</code> to see it here.</div>`;
    return;
  }
  const stats = `<div class="panel-stats">
    <span>Total: <span class="v">${TASKS.total}</span></span>
    <span>Done: <span class="v">${TASKS.counts.done || 0}</span></span>
    <span>In progress: <span class="v">${TASKS.counts["in-progress"] || 0}</span></span>
    <span>Todo: <span class="v">${TASKS.counts.todo || 0}</span></span>
    <span>Blocked: <span class="v">${TASKS.counts.blocked || 0}</span></span>
  </div>`;
  const rows = TASKS.tasks.map(t => {
    const linked = t._linked_plan;
    const planBadge = linked
      ? `<span class="plan-badge ${escape(linked.status)}" title="Linked plan ${escape(linked.id)} — ${escape(linked.status)}">↳ ${escape(linked.id.slice(0, 14))}</span>`
      : (t.plan_id ? `<span class="plan-badge" title="plan_id not found in queue">↳ ${escape(t.plan_id.slice(0, 14))}?</span>` : "");
    return `
      <div class="task-row">
        <span class="task-id">${escape(t.id)}</span>
        <span class="task-title">${escape(t.title || "")}</span>
        ${t.owner ? `<span class="task-owner">@${escape(t.owner)}</span>` : ""}
        ${t.depends_on && t.depends_on.length ? `<span class="task-deps">← ${t.depends_on.map(escape).join(", ")}</span>` : ""}
        ${planBadge}
        <span class="task-status ${escape(t.status || "todo")}">${escape(t.status || "todo")}</span>
      </div>
    `;
  }).join("");
  const errs = (TASKS.errors && TASKS.errors.length) ? `<div style="color:var(--red); font-size:12px; margin-top:12px;">Errors: ${TASKS.errors.join("; ")}</div>` : "";
  el.innerHTML = stats + rows + errs;
}

function renderGraph() {
  const el = document.getElementById("graph-panel");
  if (!GRAPH || !GRAPH.nodes || !GRAPH.nodes.length) {
    el.innerHTML = `<div class="empty">No graph data. Run <code>make cwt-graph</code> or check .cwt/graph.py.</div>`;
    return;
  }
  // Build file -> plan-status map. Later plan status wins (approved > pending > rejected)
  // because we iterate in that order of precedence for highlighting.
  const fileStatus = {};
  const priority = { approved: 3, pending: 2, rejected: 1 };
  (PLANS || []).forEach(p => {
    (p.targets || []).forEach(t => {
      const f = t.file;
      if (!f) return;
      const s = p._status;
      if (!fileStatus[f] || priority[s] > priority[fileStatus[f]]) {
        fileStatus[f] = s;
      }
    });
  });
  const highlighted = Object.keys(fileStatus).length;
  const stats = `<div class="panel-stats">
    <span>Files: <span class="v">${GRAPH.stats.files}</span></span>
    <span>Internal edges: <span class="v">${GRAPH.stats.internal_edges}</span></span>
    <span>Tooling files: <span class="v">${GRAPH.stats.tooling_files}</span></span>
    <span>Plan-touched: <span class="v">${highlighted}</span></span>
  </div>`;
  const edgesBySource = {};
  (GRAPH.edges || []).forEach(e => {
    (edgesBySource[e.from] = edgesBySource[e.from] || []).push(e.to);
  });
  // Render all nodes that are either sources OR plan-targeted (not just sources).
  const nodesToShow = GRAPH.nodes.filter(n => edgesBySource[n.id] || fileStatus[n.id]);
  const entries = nodesToShow.map(n => {
    const planClass = fileStatus[n.id] ? ` plan-${fileStatus[n.id]}` : "";
    const planLabel = fileStatus[n.id] ? `<span class="plan-badge ${escape(fileStatus[n.id])}">${escape(fileStatus[n.id])}</span>` : "";
    const imports = edgesBySource[n.id] || [];
    return `
      <div class="graph-file${planClass}">
        <div class="graph-file-head">
          <span class="graph-file-path">${escape(n.id)}</span>
          <div style="display:flex; gap:6px; align-items:center;">
            ${planLabel}
            ${n.tooling ? `<span class="graph-file-tool">tooling</span>` : ""}
          </div>
        </div>
        ${imports.length ? `<ul class="graph-imports">${imports.map(to => `<li>${escape(to)}</li>`).join("")}</ul>` : ""}
      </div>
    `;
  }).join("");
  el.innerHTML = stats + (entries || `<div class="empty">No internal imports or plan targets.</div>`);
}

function render() {
  const list = FILTER === "all" ? PLANS : PLANS.filter(p => p._status === FILTER);
  const el = document.getElementById("plans");
  if (!list.length) {
    if (FILTER === "pending") {
      // Never touch the container if the user is typing into the composer.
      if (document.activeElement && document.activeElement.id === "composer-input") {
        return;
      }
      // If the composer already exists in the DOM and nothing's changed, skip.
      if (document.getElementById("composer-input")) {
        return;
      }
      el.innerHTML = `
        <div class="onboard">
          <h2>What do you want to build?</h2>
          <div class="lede">Describe it below. We'll draft a plan for you to review before any code gets written.</div>
          <ol>
            <li>Click <strong>▶ Open App Maker</strong> above — a terminal opens, ready to build.</li>
            <li>In that terminal, type what you want. Example: <code>/cwt-plan build a daily Slack activity summary script</code></li>
            <li>The App Maker drafts a plan and stops. Come back here — it'll appear below.</li>
            <li>You approve or reject it.</li>
          </ol>
          <div class="composer">
            <textarea id="composer-input" placeholder="e.g. 'a tool that reads my Slack export and shows who posted most this week'">${escape(COMPOSER_VALUE)}</textarea>
            <div class="composer-row">
              <div class="composer-hint">You'll see a plan here to review. Nothing gets written until you approve it.</div>
              <button class="composer-btn" onclick="sendPrompt()">▶ Send</button>
            </div>
          </div>
        </div>`;
    } else {
      el.innerHTML = `<div class="empty">No ${FILTER} plans yet.</div>`;
    }
    return;
  }
  el.innerHTML = list.map(p => `
    <div class="card ${p._status}" data-plan-id="${escape(p.id || '')}">
      <div class="card-head">
        <div>
          <div class="plan-summary">${escape(p.summary || p.id || "(no summary)")}</div>
          <div class="plan-id">${escape(p.id || "?")} · ${escape(p._path || "")}</div>
        </div>
        <div class="head-right">
          ${overallScoreHtml(p.ratings)}
          <span class="pill ${p._status}">${p._status}</span>
        </div>
      </div>
      ${p.prompt ? `<div style="color:var(--dim); font-size:13px; margin-bottom:10px;">"${escape(p.prompt)}"</div>` : ""}
      <div class="plain-summary">
        <div class="plain-summary-label">What this actually does</div>
        <div class="plain-summary-body" data-plain-for="${escape(p.id || '')}">${p.plain_english ? escape(p.plain_english) : '<span class="plain-summary-loading">Translating for a non-developer…</span>'}</div>
      </div>
      <button class="details-toggle" onclick="toggleDetails(this)">▸ Show technical details</button>
      <div class="tech-details">
      <ul class="targets">
        ${(p.targets || []).map((t, i) => `
          <li class="target">
            <div><span class="target-op ${t.op || 'edit'}">${t.op || 'edit'}</span><span class="target-path">${escape(t.file || '?')}</span></div>
            ${t.justification ? `<div class="target-why">${escape(t.justification)}</div>` : ""}
            ${targetRatingHtml(p.ratings && p.ratings.targets && p.ratings.targets[i])}
          </li>
        `).join("")}
      </ul>
      </div>
      ${p._status === "pending" ? `
        <div class="actions">
          <button class="btn approve" onclick="act('${p.id}', 'approve')">✓ Approve</button>
          <button class="btn reject" onclick="act('${p.id}', 'reject')">✗ Reject</button>
        </div>
      ` : ""}
    </div>
  `).join("");
}

function escape(s) { return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }

function toggleDetails(btn) {
  const details = btn.nextElementSibling;
  if (!details) return;
  const isOpen = details.classList.toggle("open");
  btn.textContent = isOpen ? "▾ Hide technical details" : "▸ Show technical details";
}

// Async-fetch plain-English summary for any plan card that's missing it.
// Runs after render(); endpoint is server-side-cached so repeat calls are cheap.
async function fetchPlainSummaries() {
  const holders = document.querySelectorAll(".plain-summary-body[data-plain-for]");
  for (const el of holders) {
    const planId = el.getAttribute("data-plain-for");
    if (!planId) continue;
    // Skip if already filled (either from cached plan JSON or a prior fetch)
    if (!el.querySelector(".plain-summary-loading")) continue;
    try {
      const res = await fetch(`/api/explain-plan/${encodeURIComponent(planId)}`, { method: "POST" });
      if (!res.ok) {
        el.innerHTML = `<span class="plain-summary-unavailable">AI summary unavailable.</span>`;
        continue;
      }
      const data = await res.json();
      if (data.ok && data.text) {
        el.textContent = data.text;
      } else {
        const hint = data.setup_hint ? ` ${data.setup_hint}.` : "";
        el.innerHTML = `<span class="plain-summary-unavailable">AI summary unavailable.${escape(hint)}</span>`;
      }
    } catch (e) {
      el.innerHTML = `<span class="plain-summary-unavailable">Could not reach AI summary service.</span>`;
    }
  }
}

async function act(id, action) {
  const res = await fetch(`/api/plans/${id}/${action}`, { method: "POST" });
  if (res.ok) refresh();
  else alert(`Failed: ${(await res.json()).error || "unknown"}`);
}

function showToast(msg, kind = "ok", ms = 3000) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast show ${kind}`;
  setTimeout(() => { t.className = "toast"; }, ms);
}

async function sendPrompt() {
  const ta = document.getElementById("composer-input");
  const text = (ta.value || "").trim();
  if (!text) {
    showToast("Type what you want to build first", "error", 3000);
    ta.focus();
    return;
  }
  try {
    const res = await fetch("/api/send-prompt", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text }),
    });
    if (!res.ok) {
      showToast("Your .cwt/server.py is too old. Copy the latest from the template and restart (cwt down && cwt up).", "error", 8000);
      return;
    }
    const data = await res.json();
    if (data.ok) {
      showToast("Opening App Maker and sending the prompt — give it ~5 seconds.", "ok", 5000);
      ta.value = "";
      COMPOSER_VALUE = "";
    } else if (data.prompt && navigator.clipboard) {
      await navigator.clipboard.writeText(data.prompt);
      showToast(`Couldn't auto-send (${data.error || "unknown"}). Prompt copied to clipboard — paste in App Maker.`, "error", 6000);
    } else {
      showToast(`Send failed: ${data.error || "unknown"}`, "error", 5000);
    }
  } catch (e) {
    showToast(`Send failed: ${e.message}`, "error", 5000);
  }
}

async function launchClaude() {
  try {
    const res = await fetch("/api/launch-claude", { method: "POST" });
    if (!res.ok) {
      // Older server.py doesn't have this endpoint — 404 returns HTML
      showToast("Your .cwt/server.py is too old. Copy the latest from the template (cp ~/dev/cw-secure-template/.cwt/server.py .cwt/server.py) and restart: cwt down && cwt up", "error", 8000);
      return;
    }
    let data;
    try {
      data = await res.json();
    } catch {
      showToast("Unexpected response from server — try copying a fresh .cwt/server.py from the template.", "error", 6000);
      return;
    }
    if (data.ok) {
      showToast(`Opening App Maker in a new terminal (${data.method})…`, "ok");
    } else if (data.cmd && navigator.clipboard) {
      await navigator.clipboard.writeText(data.cmd);
      showToast(`Couldn't spawn terminal. Command copied to clipboard — paste it in your terminal.`, "error", 5000);
    } else {
      showToast(`Could not open App Maker: ${data.error || "unknown"}`, "error", 5000);
    }
  } catch (e) {
    showToast(`Launch failed: ${e.message}`, "error", 5000);
  }
}

function showPanel(filter) {
  const plansEl = document.getElementById("plans");
  const tasksEl = document.getElementById("tasks-panel");
  const graphEl = document.getElementById("graph-panel");
  if (filter === "tasks") {
    plansEl.style.display = "none";
    tasksEl.style.display = "block";
    graphEl.style.display = "none";
    renderTasks();
  } else if (filter === "graph") {
    plansEl.style.display = "none";
    tasksEl.style.display = "none";
    graphEl.style.display = "block";
    renderGraph();
  } else {
    plansEl.style.display = "block";
    tasksEl.style.display = "none";
    graphEl.style.display = "none";
    render();
    fetchPlainSummaries();
  }
}

document.querySelectorAll(".tab").forEach(t => {
  t.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
    t.classList.add("active");
    FILTER = t.dataset.filter;
    showPanel(FILTER);
  });
});

refresh();
setInterval(refresh, 5000);
</script>
</body>
