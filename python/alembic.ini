# Alembic configuration for database migrations.
#
# DATABASE_URL is read from the environment — never hardcode credentials here.
# Example: DATABASE_URL=postgresql+asyncpg://user:pass@localhost:5432/mydb

[alembic]
script_location = alembic
prepend_sys_path = .

# sqlalchemy.url is intentionally left blank — env.py reads DATABASE_URL
# from the environment at runtime. This prevents credentials from leaking
# into version control.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
