{% extends "base.html" %}
{% block content %}
<link rel="stylesheet" href="/static/blueprint-map/style.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<div class="app" style="height:calc(100vh - 100px)">
  <header class="bar">
    <div class="bar-left">
      <span class="bar-title">Blueprint Map</span>
    </div>
    <div class="bar-center">
      <select class="site-select" id="sheet-site">
        <option value="1dtuaNuDuLPGzqkUb6pBOBM-meeoEioGata3xGkq-zgI">EVI01 — Elk Grove</option>
        <option value="1bxVq9THKhii4y-fUGuYEuO6vy9u273Dbfu4unqD9kTw">Site 2</option>
      </select>
      <div class="hall-pills" id="hall-pills"></div>
    </div>
    <div class="bar-right">
      <button class="bar-btn" id="btn-refresh" title="Refresh">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1.5 7a5.5 5.5 0 019.37-3.9M12.5 7a5.5 5.5 0 01-9.37 3.9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M11 1v2.5h-2.5M3 13v-2.5h2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="export-wrap">
        <button class="bar-btn export-btn" id="btn-export" disabled title="Export">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v7M4 6l3 3 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 10v2h10v-2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Export</span>
        </button>
        <div class="export-menu" id="export-menu">
          <button class="export-opt" id="btn-export-png">PNG</button>
          <button class="export-opt" id="btn-export-svg">SVG</button>
          <button class="export-opt" id="btn-export-pdf">PDF</button>
        </div>
      </div>
      <button class="bar-btn" id="btn-panel" title="Settings">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="2.2" stroke="currentColor" stroke-width="1.2"/><path d="M7 1.5v1.3M7 11.2v1.3M1.5 7h1.3M11.2 7h1.3M3.1 3.1l.9.9M10 10l.9.9M3.1 10.9l.9-.9M10 4l.9-.9" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
      </button>
    </div>
  </header>

  <aside class="panel" id="panel">
    <div class="p-section">
      <div class="p-label">Upload CSV</div>
      <div class="drop-zone" id="drop-zone">
        <span>Drop .csv or click to browse</span>
        <input type="file" accept=".csv,.tsv,.txt" id="file-input">
      </div>
    </div>
    <div class="p-section">
      <div class="p-label">Search</div>
      <div class="search-bar">
        <input id="search-input" type="text" placeholder="Rack, type, grid...">
        <button id="btn-search">Go</button>
      </div>
    </div>
    <details class="p-details">
      <summary class="p-label p-label-toggle">AI Analysis</summary>
      <div class="ai-section">
        <label class="ai-toggle"><input type="checkbox" id="ai-enabled" checked> Detect layout</label>
        <div class="ai-key-row">
          <input type="password" id="ai-key" placeholder="API key">
          <button class="btn-sm" id="btn-save-key">Save</button>
        </div>
        <div class="ai-status" id="ai-status"></div>
        <div style="display:flex;gap:4px;margin-top:6px">
          <button class="btn-sm" id="btn-clear-cache" style="flex:1">Clear cache</button>
          <button class="btn-sm" id="btn-export-rules" style="flex:1">Export rules</button>
        </div>
        <input class="input" id="sheet-url" type="text" placeholder="Tab name (default: OVERHEAD)" style="margin-top:6px">
      </div>
    </details>
    <div class="p-section" id="parse-section" style="display:none">
      <div class="p-label">Structure</div>
      <div id="parse-tree"></div>
    </div>
    <div class="p-section" id="legend-section" style="display:none">
      <div class="p-label">Types</div>
      <div class="legend-list" id="legend"></div>
    </div>
    <div class="p-section">
      <div class="p-label">Detail</div>
      <div id="detail-content"><span class="detail-empty">Click a cell on the map</span></div>
    </div>
  </aside>

  <main class="canvas" id="map-container">
    <div class="map-canvas" id="map-canvas">
      <div class="empty-state" id="empty-state">
        <div class="welcome">
          <div class="welcome-icon">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect x="6" y="10" width="36" height="28" rx="3" stroke="currentColor" stroke-width="1.5"/><line x1="6" y1="22" x2="42" y2="22" stroke="currentColor" stroke-width="1" opacity=".3"/><line x1="6" y1="30" x2="42" y2="30" stroke="currentColor" stroke-width="1" opacity=".3"/><line x1="18" y1="10" x2="18" y2="38" stroke="currentColor" stroke-width="1" opacity=".3"/><line x1="30" y1="10" x2="30" y2="38" stroke="currentColor" stroke-width="1" opacity=".3"/><circle cx="24" cy="26" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M24 23v6M21 26h6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          </div>
          <div class="welcome-title">Loading your floor plan...</div>
          <div class="welcome-sub">Connecting to the live sheet</div>
          <div class="welcome-dots" id="welcome-dots"><span></span><span></span><span></span></div>
        </div>
      </div>
    </div>
    <div class="title-block" id="title-block" style="display:none">
      <span id="tb-title"></span>
      <span class="tb-sep">/</span>
      <span><span id="tb-racks"></span> racks</span>
      <span class="tb-sep">/</span>
      <span id="tb-halls"></span>
      <span class="tb-sep">/</span>
      <span id="tb-date"></span>
    </div>
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoom-in">+</button>
      <span class="zoom-level" id="zoom-level">100%</span>
      <button class="zoom-btn" id="zoom-out">&minus;</button>
      <button class="zoom-btn zoom-fit" id="zoom-fit">Fit</button>
    </div>
  </main>
</div>

<!-- hidden compat elements -->
<select id="hall-select" style="display:none"><option value="__all">All halls</option></select>
<span id="hall-sep" style="display:none"></span>
<button id="btn-fetch-sheet" style="display:none"></button>
<button id="btn-grid-view" style="display:none"></button>
<button id="btn-struct-view" style="display:none"></button>

<script>window.BP_VERSION = '2026.04.15a';</script>
<script>
(function(){
  var v = window.BP_VERSION || Date.now();
  var base = '/static/blueprint-map/';
  var scripts = ['type-library.js','parser.js','renderer.js','ai.js','app.js'];
  var i = 0;
  function next() {
    if (i >= scripts.length) return;
    var s = document.createElement('script');
    s.src = base + scripts[i++] + '?v=' + v;
    s.onload = next;
    document.body.appendChild(s);
  }
  next();
})();
</script>
{% endblock %}
