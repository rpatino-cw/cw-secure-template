# =============================================================================
# Default values for cw-secure-app
# Override per-environment via values-stg.yaml, values-prod.yaml, etc.
# =============================================================================

# -- Image configuration
image:
  repository: ghcr.io/coreweave/cw-secure-app  # Replace with your registry/repo
  tag: latest                                    # Pin to a SHA or semver in production
  pullPolicy: IfNotPresent

# -- Replica count
replicaCount: 1

# -- Resource requests and limits
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"

# -- Okta OIDC configuration (values injected from External Secrets)
okta:
  issuer: "https://coreweave.okta.com/oauth2/default"
  clientId: ""       # Pulled from Doppler via ExternalSecret
  audience: "api://cw-secure-app"

# -- Doppler secret management
doppler:
  project: "cw-secure-app"    # Doppler project name
  config: "production"         # Doppler config (staging, production, etc.)

# -- Ingress configuration
ingress:
  enabled: true
  className: "nginx-internal"   # Internal-only ingress class
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  host: "cw-secure-app.internal.coreweave.com"  # Replace with your internal hostname
  tls:
    enabled: true
    secretName: "cw-secure-app-tls"

# -- Health check configuration
healthcheck:
  path: /healthz
  port: 8080
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

# -- Service configuration
service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# -- Pod-level security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534

# -- Container-level security context
securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# -- PodDisruptionBudget (only created when replicas > 1)
pdb:
  enabled: false       # Override to true in stg/prod values files
  minAvailable: 1
