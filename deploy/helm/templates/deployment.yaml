# =============================================================================
# Kubernetes Deployment — Secure by Default
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cw-secure-app.fullname" . }}
  labels:
    {{- include "cw-secure-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cw-secure-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cw-secure-app.selectorLabels" . | nindent 8 }}
    spec:
      # SECURITY LESSON: Use a dedicated ServiceAccount (see serviceaccount.yaml)
      # rather than the namespace default. This isolates RBAC permissions and
      # gives clear audit identity for this app's pods.
      serviceAccountName: {{ include "cw-secure-app.fullname" . }}

      # SECURITY LESSON: automountServiceAccountToken=false prevents the default
      # service account token from being mounted into the pod. Most apps don't
      # need K8s API access, and a leaked token lets an attacker query the API
      # server, list secrets, or pivot to other namespaces.
      automountServiceAccountToken: false

      # SECURITY LESSON: Pod-level securityContext enforces runAsNonRoot across
      # ALL containers in the pod, including init containers and sidecars. If
      # any container tries to run as root, the kubelet rejects it outright.
      securityContext:
        runAsNonRoot: {{ .Values.podSecurityContext.runAsNonRoot }}
        runAsUser: {{ .Values.podSecurityContext.runAsUser }}
        runAsGroup: {{ .Values.podSecurityContext.runAsGroup }}
        fsGroup: {{ .Values.podSecurityContext.fsGroup }}

      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.healthcheck.port }}
              protocol: TCP

          # SECURITY LESSON: Container-level securityContext applies defense in
          # depth ON TOP of the pod-level context. Each layer independently
          # prevents privilege escalation.
          securityContext:
            # SECURITY LESSON: readOnlyRootFilesystem prevents the process from
            # writing ANYWHERE on the filesystem. An attacker can't drop malware,
            # modify configs, create cron jobs, or establish persistence. If the
            # app needs /tmp, mount an emptyDir volume.
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}

            # SECURITY LESSON: allowPrivilegeEscalation=false prevents the
            # process from gaining MORE privileges than it started with. This
            # blocks SUID/SGID binaries, ptrace attacks, and kernel exploits
            # that try to escalate from user to root.
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}

            # SECURITY LESSON: Drop ALL Linux capabilities. By default,
            # containers get a subset of root capabilities (chown, setuid,
            # net_bind_service, etc.). Dropping all of them means the process
            # runs with literally zero special OS privileges — it can only do
            # what a normal unprivileged user can do.
            capabilities:
              drop:
                {{- toYaml .Values.securityContext.capabilities.drop | nindent 16 }}

          # SECURITY LESSON: Liveness probe detects a hung or crashed process
          # and restarts the container. Without it, a compromised process that
          # stops responding stays running indefinitely, maintaining any
          # attacker's foothold.
          livenessProbe:
            httpGet:
              path: {{ .Values.healthcheck.path }}
              port: {{ .Values.healthcheck.port }}
            initialDelaySeconds: {{ .Values.healthcheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthcheck.periodSeconds }}
            timeoutSeconds: {{ .Values.healthcheck.timeoutSeconds }}
            failureThreshold: {{ .Values.healthcheck.failureThreshold }}

          # SECURITY LESSON: Readiness probe prevents traffic from reaching a
          # container that isn't ready (still initializing, overloaded, or
          # degraded). This limits exposure — a partially-started app might have
          # security middleware not yet loaded.
          readinessProbe:
            httpGet:
              path: {{ .Values.healthcheck.path }}
              port: {{ .Values.healthcheck.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: {{ .Values.healthcheck.timeoutSeconds }}
            failureThreshold: 3

          # SECURITY LESSON: Resource limits prevent a single container from
          # consuming all node resources (CPU/memory exhaustion). This mitigates
          # denial-of-service — a runaway process or crypto-miner can't starve
          # other workloads on the same node.
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory | quote }}
              cpu: {{ .Values.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.resources.limits.memory | quote }}
              cpu: {{ .Values.resources.limits.cpu | quote }}

          env:
            # SECURITY LESSON: Non-secret config comes from a ConfigMap — safe
            # to store in git, easy to audit, versioned alongside the Helm chart.
            - name: OKTA_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "cw-secure-app.fullname" . }}-config
                  key: okta-issuer
            - name: OKTA_AUDIENCE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "cw-secure-app.fullname" . }}-config
                  key: okta-audience

            # SECURITY LESSON: Secrets come from the ExternalSecret-generated
            # K8s Secret — never hardcoded, never in git, never in values.yaml.
            # The flow: Doppler → ESO → K8s Secret → env var. Rotation in
            # Doppler automatically propagates without code changes.
            - name: OKTA_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "cw-secure-app.fullname" . }}-secrets
                  key: okta-client-id
            - name: OKTA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "cw-secure-app.fullname" . }}-secrets
                  key: okta-client-secret
