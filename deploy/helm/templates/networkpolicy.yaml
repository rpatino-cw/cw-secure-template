# =============================================================================
# NetworkPolicy — Default Deny with Explicit Allowlists
# =============================================================================
#
# SECURITY PRINCIPLE: Zero-trust network posture.
#
# This policy starts by denying ALL ingress and ALL egress traffic, then
# explicitly allows only the traffic paths this application requires:
#   - Ingress: app port from the ingress controller namespace only
#   - Egress: DNS (53) to kube-system, PostgreSQL (5432) same namespace only
#
# Everything else is blocked. A compromised pod cannot scan the network,
# reach the internet, or talk to services it doesn't need.
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cw-secure-app.fullname" . }}-default-deny
  labels:
    {{- include "cw-secure-app.labels" . | nindent 4 }}
spec:
  # ---------------------------------------------------------------------------
  # TARGET: All pods belonging to this application
  # ---------------------------------------------------------------------------
  podSelector:
    matchLabels:
      {{- include "cw-secure-app.selectorLabels" . | nindent 6 }}

  # ---------------------------------------------------------------------------
  # DEFAULT DENY: Listing both Ingress and Egress here means everything
  # NOT explicitly listed below is blocked.
  # ---------------------------------------------------------------------------
  policyTypes:
    - Ingress
    - Egress

  # ---------------------------------------------------------------------------
  # INGRESS RULES — Who can talk TO our pods
  # ---------------------------------------------------------------------------
  ingress:
    # Allow traffic from the ingress controller only. Requests must come
    # through the proper ingress (with TLS termination, rate limiting, and
    # auth) to reach our pods. Direct pod-to-pod traffic from other
    # namespaces or services is blocked.
    #
    # Both selectors are in the SAME list item so they are AND'd together —
    # traffic must come from a pod matching BOTH the namespace label AND the
    # pod label. If they were separate list items, they would be OR'd.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: {{ .Values.healthcheck.port }}

  # ---------------------------------------------------------------------------
  # EGRESS RULES — Who our pods can talk TO
  # ---------------------------------------------------------------------------
  egress:
    # Rule 1: DNS resolution (UDP and TCP port 53)
    # Without DNS, pods cannot resolve any hostname — not even internal
    # Kubernetes service names. Restricted to kube-system where CoreDNS
    # runs, so a compromised pod cannot use arbitrary external DNS servers
    # as a data exfiltration channel.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # Rule 2: PostgreSQL database (TCP port 5432)
    # Scoped to pods within the SAME namespace only (empty podSelector).
    # If your database runs in a different namespace, replace with a
    # namespaceSelector targeting that specific namespace.
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 5432

    # -------------------------------------------------------------------------
    # NOTHING ELSE IS ALLOWED.
    # No HTTPS (443), no HTTP (80), no arbitrary outbound connections.
    # If the app needs to call an external API (e.g., Okta JWKS, Doppler),
    # add a specific rule below with the tightest possible CIDR and port.
    # -------------------------------------------------------------------------
