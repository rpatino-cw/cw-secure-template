# =============================================================================
# NetworkPolicy — Default Deny with Explicit Allowlist
# =============================================================================
#
# SECURITY LESSON: Why default-deny matters.
#
# Without a NetworkPolicy, every pod can talk to every other pod in the cluster
# over any port. A compromised pod can scan the internal network, reach
# databases it shouldn't know about, exfiltrate data to the internet, or pivot
# to other namespaces. Default-deny flips this: nothing is allowed unless you
# explicitly permit it. This is the network equivalent of "least privilege."
#
# Think of it like a firewall: the default rule is DROP, and you add ACCEPT
# rules only for traffic you expect and need.
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cw-secure-app.fullname" . }}-default-deny
  labels:
    {{- include "cw-secure-app.labels" . | nindent 4 }}
spec:
  # SECURITY LESSON: podSelector targets which pods this policy applies to.
  # Using our selectorLabels means this policy covers every pod in our
  # deployment — including during rolling updates when old and new pods coexist.
  podSelector:
    matchLabels:
      {{- include "cw-secure-app.selectorLabels" . | nindent 6 }}

  # SECURITY LESSON: Listing both Ingress and Egress in policyTypes with empty
  # rules would block ALL traffic. We add explicit rules below to allowlist
  # only the traffic paths this application actually needs.
  policyTypes:
    - Ingress
    - Egress

  # ---------------------------------------------------------------------------
  # INGRESS RULES — Who can talk TO our pods
  # ---------------------------------------------------------------------------
  ingress:
    # SECURITY LESSON: Allow traffic from the ingress controller only. This
    # means only requests that come through the proper ingress (with TLS
    # termination, rate limiting, and auth) can reach our pods. Direct
    # pod-to-pod traffic from other namespaces is blocked.
    - from:
        # Match pods in the ingress controller namespace. The label selector
        # targets Traefik / nginx ingress controller pods specifically.
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: {{ .Values.healthcheck.port }}

  # ---------------------------------------------------------------------------
  # EGRESS RULES — Who our pods can talk TO
  # ---------------------------------------------------------------------------
  egress:
    # SECURITY LESSON: DNS is required for any outbound name resolution. Without
    # this rule, pods can't resolve hostnames — not even internal service names.
    # We restrict to port 53 (DNS) on the kube-system namespace where CoreDNS
    # runs, so a compromised pod can't use DNS as a data exfiltration channel
    # to arbitrary DNS servers.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # SECURITY LESSON: Allow HTTPS egress to Okta for OIDC token verification.
    # When a user presents a JWT, the app needs to fetch Okta's JWKS (JSON Web
    # Key Set) to verify the token signature. Without this, auth breaks silently
    # and the app either rejects all tokens or (worse) skips verification.
    - to:
        - ipBlock:
            # Okta's IP ranges — in practice, use your Okta tenant's actual IPs
            # or a more specific CIDR. 0.0.0.0/0 with port restriction is a
            # reasonable starting point; tighten once you know Okta's ranges.
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443

    # SECURITY LESSON: Allow HTTPS egress to Doppler for secret sync. The
    # External Secrets Operator (ESO) runs in its own namespace and handles
    # Doppler communication, but if your app fetches config directly from
    # Doppler at startup, it needs this egress path. If you only use ESO,
    # you can remove this rule and further reduce the attack surface.
    # - to:
    #     - ipBlock:
    #         cidr: 0.0.0.0/0  # Replace with Doppler's actual IP ranges
    #   ports:
    #     - protocol: TCP
    #       port: 443
