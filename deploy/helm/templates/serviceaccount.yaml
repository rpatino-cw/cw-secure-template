# =============================================================================
# ServiceAccount — Least Privilege Identity
# =============================================================================
#
# SECURITY LESSON: Every pod runs as a ServiceAccount. If you don't specify one,
# Kubernetes uses the 'default' ServiceAccount in the namespace — which may have
# broad permissions granted by cluster admins or other teams' RoleBindings.
#
# Creating a dedicated ServiceAccount for your app means:
# 1. You control exactly what permissions it has (ideally: none)
# 2. RBAC policies can target your app specifically
# 3. Audit logs show your app's identity, not a generic 'default'
# 4. If compromised, the blast radius is limited to this SA's permissions
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cw-secure-app.fullname" . }}
  labels:
    {{- include "cw-secure-app.labels" . | nindent 4 }}
  annotations:
    # SECURITY LESSON: Annotations are where integrations like Doppler, ESO,
    # Workload Identity, or IAM role bindings attach to the ServiceAccount.
    # These are placeholders — replace with your actual integration values.
    #
    # For Doppler via External Secrets Operator:
    # The ESO ClusterSecretStore handles Doppler auth centrally, so the SA
    # itself doesn't need Doppler credentials. This annotation is informational
    # — it tells operators which Doppler project this SA's pods consume.
    doppler.com/project: {{ .Values.doppler.project | quote }}
    doppler.com/config: {{ .Values.doppler.config | quote }}

# SECURITY LESSON: automountServiceAccountToken=false at the SA level is the
# strongest form of this protection. Even if a deployment template forgets to
# set it, the SA-level setting prevents the token from being mounted.
#
# The default behavior mounts a JWT token at /var/run/secrets/kubernetes.io/
# serviceaccount/token inside every pod. That token can authenticate to the
# K8s API server. If an attacker compromises your pod, that token lets them:
#   - List all pods, services, and secrets in the namespace
#   - Potentially escalate to cluster-admin via misconfigured RBAC
#   - Pivot to other namespaces if the SA has cross-namespace bindings
#
# Most apps never need to talk to the K8s API. Setting this to false removes
# the token entirely — the attack vector disappears.
automountServiceAccountToken: false
