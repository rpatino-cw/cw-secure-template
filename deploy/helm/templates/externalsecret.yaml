# =============================================================================
# External Secrets Operator — Doppler Integration
# =============================================================================
#
# SECURITY LESSON: Why use ESO instead of committing secrets to git or passing
# them in values.yaml?
#
# 1. Git is permanent — even if you delete a secret from HEAD, it lives in git
#    history forever. Anyone who clones the repo has every secret you ever
#    committed. ESO means secrets NEVER touch git.
#
# 2. Rotation without deploys — when a secret is rotated in Doppler, ESO
#    automatically syncs the new value to the K8s Secret. No PR, no rebuild,
#    no redeploy. This matters during incidents when you need to rotate a
#    compromised credential in minutes, not hours.
#
# 3. Access control — Doppler has its own RBAC. Not everyone who can read the
#    Helm chart can read the secrets. With gitops secrets, chart access = secret
#    access.
#
# 4. Audit trail — Doppler logs every secret read, write, and rotation. Git
#    only logs commits, not who read what.
#
# Flow: Doppler (source of truth) → ESO polls/syncs → K8s Secret (ephemeral)
#       → Pod env vars (via secretKeyRef in deployment.yaml)
# =============================================================================

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "cw-secure-app.fullname" . }}-secrets
  labels:
    {{- include "cw-secure-app.labels" . | nindent 4 }}
spec:
  # SECURITY LESSON: refreshInterval controls how often ESO checks Doppler for
  # updated secrets. 1h is a reasonable default — frequent enough to pick up
  # rotations quickly, infrequent enough to avoid hammering the secrets backend.
  # For critical apps, consider 5m-15m.
  refreshInterval: 1h

  secretStoreRef:
    # SECURITY LESSON: ClusterSecretStore is a cluster-wide resource managed by
    # platform admins. Using it instead of a namespace-scoped SecretStore means
    # individual teams don't need to manage Doppler credentials themselves —
    # the platform team handles the authentication to the secrets backend.
    kind: ClusterSecretStore
    name: doppler-cluster-store

  target:
    # SECURITY LESSON: This is the name of the K8s Secret that ESO creates.
    # The deployment.yaml references this name in secretKeyRef. The Secret is
    # ephemeral — ESO recreates it if deleted, and it's never stored in git.
    name: {{ include "cw-secure-app.fullname" . }}-secrets
    creationPolicy: Owner

  data:
    # SECURITY LESSON: Each entry maps a Doppler secret key to a K8s Secret
    # key. The remoteRef.key is the name in Doppler; the secretKey is the name
    # in the K8s Secret. Keep them descriptive but don't leak what they protect
    # in the key name itself (e.g., don't name it "prod-database-root-password").
    - secretKey: okta-client-id
      remoteRef:
        key: OKTA_CLIENT_ID
        property: "{{ .Values.doppler.project }}/{{ .Values.doppler.config }}"

    - secretKey: okta-client-secret
      remoteRef:
        key: OKTA_CLIENT_SECRET
        property: "{{ .Values.doppler.project }}/{{ .Values.doppler.config }}"

    # Add additional secret mappings below as needed:
    # - secretKey: database-url
    #   remoteRef:
    #     key: DATABASE_URL
    #     property: "{{ .Values.doppler.project }}/{{ .Values.doppler.config }}"
