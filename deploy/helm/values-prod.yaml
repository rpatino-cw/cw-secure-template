# =============================================================================
# Production Environment Overrides
# =============================================================================
# Full HA, strict resource limits, production Okta, PDB enforced.
# This is the config ArgoCD uses by default (see deploy/argo/application.yaml).
# Applied via: helm install -f values.yaml -f values-prod.yaml
# =============================================================================

# -- Three replicas for production HA.
# SECURITY LESSON: Multiple replicas aren't just for availability — they limit
# blast radius. If one pod is compromised, the others keep serving clean traffic
# while you investigate. A single replica means one compromised pod = total outage.
replicaCount: 3

# -- Image config — production MUST pin to a SHA or semver tag, never 'latest'.
# SECURITY LESSON: 'latest' is a moving target. A supply chain attack that
# pushes a malicious 'latest' image auto-deploys to your prod cluster.
# Pinning to a digest (sha256:abc123) or immutable tag ensures you run exactly
# the code that was reviewed, tested, and approved.
image:
  tag: "v1.0.0"  # Replace with actual release tag or SHA digest
  pullPolicy: IfNotPresent

# -- Full production resources
resources:
  requests:
    memory: "256Mi"
    cpu: "200m"
  limits:
    memory: "512Mi"
    cpu: "400m"

# -- Okta production tenant
okta:
  issuer: "https://coreweave.okta.com/oauth2/default"
  clientId: ""  # Pulled from Doppler prod config via ExternalSecret
  audience: "api://cw-secure-app"

# -- Doppler production config
doppler:
  project: "cw-secure-app"
  config: "prod"

# -- Ingress enabled with production hostname
ingress:
  enabled: true
  className: "nginx-internal"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # SECURITY LESSON: Rate limiting at the ingress layer provides a first line
    # of defense before requests even reach your application's rate limiter.
    # Defense in depth — multiple layers, each with its own limits.
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
  host: "cw-secure-app.internal.coreweave.com"
  tls:
    enabled: true
    secretName: "cw-secure-app-tls"

# -- PDB enforced in production
pdb:
  enabled: true
  minAvailable: 1
