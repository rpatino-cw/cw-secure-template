name: Configure Branch Protection

on:
  workflow_dispatch:

# NOTE: The default GITHUB_TOKEN does NOT have permission to manage branch
# protection rules. You must create a Personal Access Token (classic) with
# the "repo" scope (or a fine-grained PAT with "Administration: write")
# and store it as a repository secret named BRANCH_PROTECTION_TOKEN.
#
# Steps:
#   1. Go to https://github.com/settings/tokens → Generate new token (classic)
#   2. Select scope: "repo" (Full control of private repositories)
#   3. Copy the token
#   4. In your repo → Settings → Secrets → Actions → New repository secret
#      Name: BRANCH_PROTECTION_TOKEN   Value: <your token>
#   5. Run this workflow from the Actions tab

permissions:
  contents: read

jobs:
  setup:
    name: Set Branch Protection on main
    runs-on: ubuntu-latest
    steps:
      - name: Configure branch protection
        env:
          GH_TOKEN: ${{ secrets.BRANCH_PROTECTION_TOKEN }}
        run: |
          REPO="${{ github.repository }}"

          gh api -X PUT "repos/${REPO}/branches/main/protection" \
            --input - <<'EOF'
          {
            "required_status_checks": {
              "strict": true,
              "contexts": [
                "Secret Scanning",
                "Go Checks",
                "Python Checks",
                "Dependency Audit",
                "CodeQL Analysis",
                "Hook Integrity Check"
              ]
            },
            "enforce_admins": false,
            "required_pull_request_reviews": {
              "dismiss_stale_reviews": true,
              "require_code_owner_reviews": false,
              "required_approving_review_count": 1
            },
            "restrictions": null,
            "allow_force_pushes": false,
            "allow_deletions": false
          }
          EOF

          echo "## Branch Protection Configured" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Applied to **main** on \`${REPO}\`:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **PR reviews:** 1 required, stale reviews dismissed" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status checks:** secrets, go, python, dependencies, codeql, hook-integrity" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Up-to-date branches:** required" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Force pushes:** blocked" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch deletion:** blocked" >> "$GITHUB_STEP_SUMMARY"
