name: Commit Signing Verification

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify-signatures:
    name: Verify Commit Signatures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check all PR commits are signed
        run: |
          UNSIGNED=0
          BASE_SHA=$(git merge-base origin/${{ github.base_ref }} HEAD)

          echo "Checking commits from ${BASE_SHA}..HEAD"
          echo "──────────────────────────────────"

          while IFS= read -r line; do
            HASH=$(echo "$line" | cut -d' ' -f1)
            SIG=$(echo "$line" | cut -d' ' -f2)
            MSG=$(echo "$line" | cut -d' ' -f3-)

            case "$SIG" in
              G|U|X|Y|R|E)
                echo "  Signed:   $HASH $MSG"
                ;;
              N|"")
                echo "  UNSIGNED: $HASH $MSG"
                UNSIGNED=$((UNSIGNED + 1))
                ;;
              B)
                echo "  BAD SIG:  $HASH $MSG"
                UNSIGNED=$((UNSIGNED + 1))
                ;;
              *)
                echo "  UNKNOWN:  $HASH (status: $SIG) $MSG"
                UNSIGNED=$((UNSIGNED + 1))
                ;;
            esac
          done < <(git log --format='%H %G? %s' "${BASE_SHA}..HEAD")

          echo "──────────────────────────────────"

          if [ "$UNSIGNED" -gt 0 ]; then
            echo "::error::Found $UNSIGNED unsigned or invalid commit(s). All commits must be signed (GPG or SSH)."
            echo ""
            echo "To set up commit signing:"
            echo "  GPG: https://docs.github.com/en/authentication/managing-commit-signature-verification"
            echo "  SSH: git config --global gpg.format ssh && git config --global user.signingkey ~/.ssh/id_ed25519.pub"
            echo "  Auto-sign: git config --global commit.gpgsign true"
            exit 1
          fi

          echo "All commits are signed."
