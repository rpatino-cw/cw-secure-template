name: Security & Quality Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  # ──────────────────────────────────────
  # Secret Scanning — catch leaked creds
  # ──────────────────────────────────────
  secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────
  # Go — lint, security scan, test
  # ──────────────────────────────────────
  go:
    name: Go Checks
    runs-on: ubuntu-latest
    if: hashFiles('go/go.mod') != ''
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: go

      - name: Security scan (gosec)
        uses: securego/gosec@v2.21.4
        with:
          args: ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage gate (80% minimum)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 80" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below the 80% threshold"
            exit 1
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: go/coverage.out

      - name: Generate SBOM
        run: go list -m all > sbom-go.txt

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-go
          path: go/sbom-go.txt

  # ──────────────────────────────────────
  # Python — lint, security scan, test
  # ──────────────────────────────────────
  python:
    name: Python Checks
    runs-on: ubuntu-latest
    if: hashFiles('python/pyproject.toml') != ''
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Security scan (bandit)
        run: bandit -c bandit.yaml -r src/

      - name: Test
        run: pytest --cov=src --cov-report=term-missing --cov-fail-under=80

      - name: Generate SBOM
        run: pip freeze > sbom-python.txt

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-python
          path: python/sbom-python.txt

  # ──────────────────────────────────────
  # Dependency scanning
  # ──────────────────────────────────────
  dependencies:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Go dependency audit
        if: hashFiles('go/go.mod') != ''
        run: |
          cd go && go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...

      - name: Python dependency audit
        if: hashFiles('python/pyproject.toml') != ''
        run: |
          pip install pip-audit
          cd python && pip-audit .

  # ──────────────────────────────────────
  # AI Slop Detection — catch low-quality AI code
  # ──────────────────────────────────────
  slop-check:
    name: AI Slop Check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install slop detectors
        run: pip install sloppylint ai-slop-detector

      - name: Run sloppylint (Python)
        if: hashFiles('python/pyproject.toml') != ''
        run: |
          cd python && sloppylint src/ || true

      - name: Run ai-slop-detector (Python)
        if: hashFiles('python/pyproject.toml') != ''
        run: |
          cd python
          for f in $(find src -name "*.py" -not -name "__init__.py"); do
            echo "--- $f ---"
            slop-detector "$f" 2>&1 | grep -E "Status|Deficit|LDR" || true
          done

  # ──────────────────────────────────────
  # Commit Signing — verify GPG/SSH signatures
  # ──────────────────────────────────────
  commit-signing:
    name: Commit Signing Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify all PR commits are signed
        run: |
          UNSIGNED=0
          TOTAL=0

          # Check every commit in this PR (base..HEAD)
          for COMMIT in $(git rev-list origin/${{ github.base_ref }}..HEAD); do
            TOTAL=$((TOTAL + 1))
            # %G? returns: G=good, U=untrusted-good, X=expired-good,
            #              Y=expired-key-good, R=revoked, E=cannot-check,
            #              B=bad, N=no-signature
            SIG_STATUS=$(git log --format='%G?' -1 "$COMMIT")
            COMMIT_SHORT=$(git log --format='%h %s' -1 "$COMMIT")

            case "$SIG_STATUS" in
              G|U|X|Y)
                echo "  [SIGNED]   $COMMIT_SHORT"
                ;;
              *)
                echo "  [UNSIGNED] $COMMIT_SHORT (status: $SIG_STATUS)"
                UNSIGNED=$((UNSIGNED + 1))
                ;;
            esac
          done

          echo ""
          echo "Checked $TOTAL commit(s): $((TOTAL - UNSIGNED)) signed, $UNSIGNED unsigned."

          if [ "$UNSIGNED" -gt 0 ]; then
            echo ""
            echo "::error::$UNSIGNED commit(s) are not signed. All commits must be GPG or SSH signed."
            echo ""
            echo "To set up commit signing:"
            echo "  1. Generate a GPG key:   gpg --full-generate-key"
            echo "  2. List keys:            gpg --list-secret-keys --keyid-format=long"
            echo "  3. Configure git:"
            echo "       git config --global user.signingkey <YOUR_KEY_ID>"
            echo "       git config --global commit.gpgsign true"
            echo "  4. Add public key to GitHub: https://github.com/settings/keys"
            echo ""
            echo "  Alternatively, use SSH signing (Git 2.34+):"
            echo "       git config --global gpg.format ssh"
            echo "       git config --global user.signingkey ~/.ssh/id_ed25519.pub"
            echo "       git config --global commit.gpgsign true"
            echo ""
            echo "  Then re-sign your commits:"
            echo "       git rebase --exec 'git commit --amend --no-edit -S' origin/main"
            exit 1
          fi

  # ──────────────────────────────────────
  # README Size Gate — keep docs tight
  # ──────────────────────────────────────
  readme-size:
    name: README Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: README must be 150 lines or fewer
        run: |
          LINES=$(wc -l < README.md | tr -d ' ')
          echo "README.md is $LINES lines."
          if [ "$LINES" -gt 150 ]; then
            echo "::error::README.md is $LINES lines (max 150). Keep it concise."
            exit 1
          fi

  # ──────────────────────────────────────
  # CodeQL — deep static analysis
  # ──────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [go, python]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  # ──────────────────────────────────────
  # Guard Unit Tests — verify all 11 guard checks work
  # ──────────────────────────────────────
  guard-tests:
    name: Guard Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run guard unit tests (30 checks)
        run: bash scripts/guards/test-guards.sh

  # ──────────────────────────────────────
  # Hook Integrity — prevent weakening security tooling
  # ──────────────────────────────────────
  hook-integrity:
    name: Hook Integrity Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check pre-commit hooks not weakened
        run: |
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- .pre-commit-config.yaml)
          if echo "$DIFF" | grep -q '^-.*- repo:'; then
            echo "::error::PR removes a pre-commit hook repo. This is not allowed."
            exit 1
          fi
          if echo "$DIFF" | grep -q '^-.*id:'; then
            echo "::error::PR removes a pre-commit hook id. This is not allowed."
            exit 1
          fi
          echo "Pre-commit config OK — no hooks removed."

      - name: Check CLAUDE.md security sections intact
        run: |
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- CLAUDE.md)
          REQUIRED_SECTIONS=(
            "Anti-Override Protocol"
            "ABSOLUTE RULES"
            "No Secrets in Code"
            "Authentication"
            "Input Validation"
            "No Dangerous Functions"
            "OWASP Top 10"
          )
          for section in "${REQUIRED_SECTIONS[@]}"; do
            if echo "$DIFF" | grep -q "^-.*$section"; then
              echo "::error::PR removes security section '$section' from CLAUDE.md. This is not allowed."
              exit 1
            fi
          done
          echo "CLAUDE.md security sections intact."

      - name: Verify .last-hook-run is recent
        run: |
          if [ ! -f .last-hook-run ]; then
            echo "::error::.last-hook-run file not found. Run 'make check' before pushing."
            exit 1
          fi
          HOOK_TS=$(cat .last-hook-run)
          if ! [[ "$HOOK_TS" =~ ^[0-9]+$ ]]; then
            echo "::error::.last-hook-run has invalid format (expected epoch seconds). Run 'make check' to regenerate."
            exit 1
          fi
          LATEST_COMMIT_TS=$(git log -1 --format=%ct)
          DIFF_SECONDS=$((LATEST_COMMIT_TS - HOOK_TS))
          if [ "$DIFF_SECONDS" -gt 3600 ]; then
            echo "::error::.last-hook-run is more than 1 hour older than the latest commit. Run 'make check' before pushing."
            exit 1
          fi
          echo ".last-hook-run is within 1 hour of latest commit."

      - name: Verify security middleware is still wired
        run: |
          FAIL=0

  # ──────────────────────────────────────
  # SVG Validation — catch broken terminal animations
  # ──────────────────────────────────────
  svg-validation:
    name: SVG Rendering Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Find SVG files changed in PR
        id: svgs
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.svg')
          if [ -z "$FILES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No SVG files changed — skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Changed SVGs:"
            echo "$FILES"
          fi

      - name: Validate SVG well-formedness
        if: steps.svgs.outputs.skip != 'true'
        run: |
          FAIL=0
          for svg in $(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.svg'); do
            [ -f "$svg" ] || continue
            echo "Checking $svg..."

            # XML well-formedness (catches unclosed tags, bad entities)
            if ! python3 -c "
          import xml.etree.ElementTree as ET
          try:
              ET.parse('$svg')
              print('  XML: valid')
          except ET.ParseError as e:
              print(f'  XML: INVALID — {e}')
              exit(1)
          "; then
              FAIL=1
            fi
          done
          [ "$FAIL" -eq 0 ] || { echo "::error::SVG XML validation failed"; exit 1; }

      - name: Validate terminal SVG structure
        if: steps.svgs.outputs.skip != 'true'
        run: |
          FAIL=0
          for svg in $(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'docs/terminal/*.svg'); do
            [ -f "$svg" ] || continue
            echo "Checking terminal SVG structure: $svg..."

            # Must have viewBox for responsive rendering
            if ! grep -q 'viewBox=' "$svg"; then
              echo "::error::$svg missing viewBox attribute — won't scale on GitHub"
              FAIL=1
            fi

            # Must have animation keyframes
            if ! grep -q '@keyframes' "$svg"; then
              echo "::error::$svg missing @keyframes — animation won't play"
              FAIL=1
            fi

            # Must have window chrome (terminal look)
            if ! grep -q 'circle.*fill="#ff5f56"' "$svg"; then
              echo "::warning::$svg missing traffic light dots — terminal chrome may be broken"
            fi

            # Must have monospace font
            if ! grep -qi 'monospace\|Menlo\|Monaco\|Courier' "$svg"; then
              echo "::error::$svg missing monospace font — terminal text won't render correctly"
              FAIL=1
            fi

            # File size check (SVGs over 50KB are suspicious)
            SIZE=$(wc -c < "$svg" | tr -d ' ')
            if [ "$SIZE" -gt 51200 ]; then
              echo "::warning::$svg is ${SIZE} bytes (>50KB) — consider optimizing"
            fi

            echo "  OK"
          done
          [ "$FAIL" -eq 0 ] || { echo "::error::Terminal SVG validation failed"; exit 1; }

          # Go: verify middleware is imported and used
          if [ -f go/main.go ]; then
            echo "Checking Go middleware wiring..."
            for PATTERN in "middleware.RequireAuth" "middleware.RateLimit" "middleware.RequestID" "middleware.SecurityHeaders" "middleware.RequestSizeMiddleware"; do
              if ! grep -q "$PATTERN" go/main.go; then
                echo "::error::go/main.go is missing $PATTERN — security middleware was unwired"
                FAIL=1
              fi
            done
          fi

          # Python: verify middleware is imported and used
          if [ -f python/src/main.py ]; then
            echo "Checking Python middleware wiring..."
            for PATTERN in "RateLimitMiddleware" "RequestIDMiddleware" "RequestSizeLimitMiddleware" "get_current_user"; do
              if ! grep -q "$PATTERN" python/src/main.py; then
                echo "::error::python/src/main.py is missing $PATTERN — security middleware was unwired"
                FAIL=1
              fi
            done
          fi

          if [ "$FAIL" -ne 0 ]; then
            echo "::error::Security middleware has been removed. This is not allowed."
            exit 1
          fi
          echo "All security middleware verified."
