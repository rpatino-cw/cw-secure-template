<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" fill="none">
  <style>
    @keyframes pulse1 { 0%,100%{opacity:.3} 15%,25%{opacity:1} }
    @keyframes pulse2 { 0%,100%{opacity:.3} 25%,35%{opacity:1} }
    @keyframes pulse3 { 0%,100%{opacity:.3} 35%,45%{opacity:1} }
    @keyframes pulse4 { 0%,100%{opacity:.3} 45%,55%{opacity:1} }
    @keyframes pulse5 { 0%,100%{opacity:.3} 55%,65%{opacity:1} }
    @keyframes pulse6 { 0%,100%{opacity:.3} 65%,75%{opacity:1} }
    @keyframes dash { to { stroke-dashoffset: -20; } }
    @keyframes dot { 0%{cx:90} 15%{cx:225} 30%{cx:375} 45%{cx:525} 60%{cx:665} 75%{cx:810} 76%,100%{cx:810;opacity:0} }
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .stage-label { font-size: 11px; font-weight: 600; fill: #1a1a2e; }
    .stage-sub { font-size: 9px; fill: #6b7280; }
    .conn { stroke: #d1d5db; stroke-width: 2; stroke-dasharray: 6 4; animation: dash 1s linear infinite; }
  </style>

  <!-- Background -->
  <rect width="900" height="200" rx="16" fill="#f8f9fa"/>
  <rect width="900" height="200" rx="16" fill="none" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Connection lines -->
  <line x1="120" y1="80" x2="195" y2="80" class="conn"/>
  <line x1="265" y1="80" x2="340" y2="80" class="conn"/>
  <line x1="415" y1="80" x2="490" y2="80" class="conn"/>
  <line x1="560" y1="80" x2="635" y2="80" class="conn"/>
  <line x1="705" y1="80" x2="780" y2="80" class="conn"/>

  <!-- Traveling dot -->
  <circle r="5" cy="80" fill="#6366f1" opacity="0.8">
    <animate attributeName="cx" values="90;225;375;525;665;810;810" keyTimes="0;0.15;0.3;0.45;0.6;0.75;1" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.9;0.9;0.9;0.9;0.9;0" keyTimes="0;0.15;0.3;0.45;0.6;0.74;0.75" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="5;5;5;5;5;5;8;0" keyTimes="0;0.15;0.3;0.45;0.6;0.7;0.74;0.75" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Stage 1: Your Code -->
  <g style="animation: pulse1 4s ease infinite">
    <rect x="40" y="45" width="100" height="70" rx="12" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="90" y="75" text-anchor="middle" class="stage-label">Your Code</text>
    <text x="90" y="92" text-anchor="middle" class="stage-sub">+ Claude AI</text>
  </g>

  <!-- Stage 2: CLAUDE.md -->
  <g style="animation: pulse2 4s ease infinite">
    <rect x="175" y="45" width="100" height="70" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="225" y="75" text-anchor="middle" class="stage-label">CLAUDE.md</text>
    <text x="225" y="92" text-anchor="middle" class="stage-sub">14 rules</text>
  </g>

  <!-- Stage 3: Pre-commit -->
  <g style="animation: pulse3 4s ease infinite">
    <rect x="310" y="45" width="120" height="70" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
    <text x="370" y="75" text-anchor="middle" class="stage-label">Pre-commit</text>
    <text x="370" y="92" text-anchor="middle" class="stage-sub">Secrets + lint</text>
  </g>

  <!-- Stage 4: CI -->
  <g style="animation: pulse4 4s ease infinite">
    <rect x="465" y="45" width="100" height="70" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="515" y="75" text-anchor="middle" class="stage-label">CI Pipeline</text>
    <text x="515" y="92" text-anchor="middle" class="stage-sub">CodeQL + 80%</text>
  </g>

  <!-- Stage 5: PR Review -->
  <g style="animation: pulse5 4s ease infinite">
    <rect x="600" y="45" width="115" height="70" rx="12" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
    <text x="657" y="75" text-anchor="middle" class="stage-label">PR Review</text>
    <text x="657" y="92" text-anchor="middle" class="stage-sub">Checklist</text>
  </g>

  <!-- Stage 6: Deploy -->
  <g style="animation: pulse6 4s ease infinite">
    <rect x="750" y="45" width="110" height="70" rx="12" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="805" y="75" text-anchor="middle" class="stage-label">Deploy</text>
    <text x="805" y="92" text-anchor="middle" class="stage-sub">Helm + Okta</text>
  </g>

  <!-- Bottom tagline -->
  <text x="450" y="155" text-anchor="middle" font-size="12" fill="#9ca3af" font-family="-apple-system, sans-serif">
    Each layer catches what the previous one missed. No single point of failure.
  </text>
  <text x="450" y="175" text-anchor="middle" font-size="10" fill="#d1d5db" font-family="-apple-system, sans-serif">
    Even --no-verify is caught by CI timestamp tracking.
  </text>
</svg>
