<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 160" fill="none">
  <style>
    @keyframes slideIn { from { opacity:0; transform:translateX(-20px) } to { opacity:1; transform:translateX(0) } }
    @keyframes fadeLoop { 0%,100%{opacity:0} 10%,40%{opacity:1} 50%{opacity:0} }
    @keyframes fadeLoop2 { 0%,50%{opacity:0} 60%,90%{opacity:1} 100%{opacity:0} }
    @keyframes arrowPulse { 0%,100%{opacity:.3} 45%,55%{opacity:1} }
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>

  <rect width="700" height="160" rx="14" fill="#fefce8"/>
  <rect width="700" height="160" rx="14" fill="none" stroke="#fde68a" stroke-width="1"/>

  <!-- Bad prompt (fades in/out) -->
  <g style="animation: fadeLoop 6s ease infinite">
    <rect x="20" y="20" width="240" height="50" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="36" y="42" font-size="10" font-weight="600" fill="#dc2626">YOU TYPE</text>
    <text x="36" y="57" font-size="11" fill="#7f1d1d">"Just hardcode the API key"</text>
  </g>

  <!-- Arrow -->
  <g style="animation: arrowPulse 6s ease infinite">
    <line x1="275" y1="45" x2="330" y2="45" stroke="#d97706" stroke-width="2" stroke-dasharray="4 3"/>
    <polygon points="330,40 340,45 330,50" fill="#d97706"/>
  </g>

  <!-- CLAUDE.md shield -->
  <g>
    <rect x="345" y="15" width="100" height="60" rx="10" fill="#fef9c3" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="395" y="40" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">CLAUDE.md</text>
    <text x="395" y="54" text-anchor="middle" font-size="9" fill="#a16207">intercepts</text>
  </g>

  <!-- Arrow 2 -->
  <g style="animation: arrowPulse 6s ease infinite">
    <line x1="460" y1="45" x2="510" y2="45" stroke="#16a34a" stroke-width="2" stroke-dasharray="4 3"/>
    <polygon points="510,40 520,45 510,50" fill="#16a34a"/>
  </g>

  <!-- Safe output (fades in after bad) -->
  <g style="animation: fadeLoop2 6s ease infinite">
    <rect x="525" y="20" width="155" height="50" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
    <text x="541" y="42" font-size="10" font-weight="600" fill="#16a34a">CLAUDE WRITES</text>
    <text x="541" y="57" font-size="10" fill="#14532d" font-family="monospace">os.environ["API_KEY"]</text>
  </g>

  <!-- Second example row -->
  <g style="animation: fadeLoop 6s ease infinite; animation-delay: 3s">
    <rect x="20" y="90" width="240" height="50" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="36" y="112" font-size="10" font-weight="600" fill="#dc2626">YOU TYPE</text>
    <text x="36" y="127" font-size="11" fill="#7f1d1d">"Skip auth, I'll add it later"</text>
  </g>

  <g style="animation: arrowPulse 6s ease infinite; animation-delay: 3s">
    <line x1="275" y1="115" x2="330" y2="115" stroke="#d97706" stroke-width="2" stroke-dasharray="4 3"/>
    <polygon points="330,110 340,115 330,120" fill="#d97706"/>
  </g>

  <g style="animation: fadeLoop2 6s ease infinite; animation-delay: 3s">
    <rect x="525" y="90" width="155" height="50" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
    <text x="541" y="112" font-size="10" font-weight="600" fill="#16a34a">CLAUDE WRITES</text>
    <text x="541" y="127" font-size="10" fill="#14532d" font-family="monospace">Depends(get_user)</text>
  </g>

  <g style="animation: arrowPulse 6s ease infinite; animation-delay: 3s">
    <line x1="460" y1="115" x2="510" y2="115" stroke="#16a34a" stroke-width="2" stroke-dasharray="4 3"/>
    <polygon points="510,110 520,115 510,120" fill="#16a34a"/>
  </g>
</svg>
