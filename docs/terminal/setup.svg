<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .line { opacity: 0; animation: fadeIn 0.3s ease forwards; }
    .l1  { animation-delay: 0.3s; }
    .l2  { animation-delay: 0.6s; }
    .l3  { animation-delay: 1.0s; }
    .l4  { animation-delay: 1.4s; }
    .l5  { animation-delay: 1.8s; }
    .l6  { animation-delay: 2.1s; }
    .l7  { animation-delay: 2.4s; }
    .l8  { animation-delay: 2.7s; }
    .l9  { animation-delay: 3.0s; }
    .l10 { animation-delay: 3.3s; }
    .l11 { animation-delay: 3.6s; }
    .l12 { animation-delay: 3.9s; }
    .l13 { animation-delay: 4.2s; }
    .l14 { animation-delay: 4.5s; }
    .l15 { animation-delay: 4.8s; }
    text {
      font-family: Menlo, Monaco, 'Courier New', monospace;
      font-size: 14px;
    }
    .cmd    { fill: #7dcfff; }
    .normal { fill: #c0caf5; }
    .green  { fill: #9ece6a; }
    .dim    { fill: #565f89; }
    .yellow { fill: #e0af68; }
    .white  { fill: #a9b1d6; }
    .bold   { fill: #c0caf5; font-weight: bold; }
  </style>

  <!-- Window chrome -->
  <rect width="800" height="520" rx="12" ry="12" fill="#1a1b26"/>
  <rect width="800" height="40" rx="12" ry="12" fill="#24283b"/>
  <rect y="28" width="800" height="12" fill="#24283b"/>
  <circle cx="24" cy="20" r="7" fill="#ff5f56"/>
  <circle cx="46" cy="20" r="7" fill="#ffbd2e"/>
  <circle cx="68" cy="20" r="7" fill="#27c93f"/>
  <text x="400" y="24" text-anchor="middle" fill="#565f89" font-size="13" font-family="Menlo, Monaco, monospace">Terminal</text>

  <!-- Terminal content -->
  <g transform="translate(28, 70)">
    <text class="line l1" y="0"><tspan class="dim">$</tspan><tspan class="cmd"> git clone https://github.com/rpatino-cw/cw-secure-template my-app</tspan></text>
    <text class="line l2" y="24"><tspan class="dim">Cloning into 'my-app'...</tspan></text>

    <text class="line l3" y="60"><tspan class="dim">$</tspan><tspan class="cmd"> cd my-app &amp;&amp; bash setup.sh</tspan></text>

    <text class="line l4" y="100"><tspan class="bold">  Welcome to the CW Secure Template</tspan></text>
    <text class="line l5" y="124"><tspan class="dim">  ──────────────────────────────────</tspan></text>

    <text class="line l6"  y="160"><tspan class="white">  Which language?</tspan><tspan class="yellow"> Python selected.</tspan></text>
    <text class="line l7"  y="184"><tspan class="green">  &#x2713; Created .env file</tspan></text>
    <text class="line l8"  y="208"><tspan class="green">  &#x2713; Security hooks installed</tspan></text>
    <text class="line l9"  y="232"><tspan class="green">  &#x2713; Dependencies installed</tspan></text>
    <text class="line l10" y="256"><tspan class="green">  &#x2713; Memory compiler ready</tspan></text>

    <text class="line l11" y="296"><tspan class="white">  Setup complete! Run:</tspan><tspan class="cmd"> make start</tspan></text>
  </g>
</svg>