<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540">
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .line { opacity: 0; animation: fadeIn 0.3s ease forwards; }
    .l1  { animation-delay: 0.3s; }
    .l2  { animation-delay: 0.7s; }
    .l3  { animation-delay: 1.0s; }
    .l4  { animation-delay: 1.3s; }
    .l5  { animation-delay: 1.6s; }
    .l6  { animation-delay: 1.9s; }
    .l7  { animation-delay: 2.2s; }
    .l8  { animation-delay: 2.5s; }
    .l9  { animation-delay: 2.8s; }
    .l10 { animation-delay: 3.1s; }
    .l11 { animation-delay: 3.4s; }
    .l12 { animation-delay: 3.7s; }
    .l13 { animation-delay: 4.0s; }
    .l14 { animation-delay: 4.3s; }
    text {
      font-family: Menlo, Monaco, 'Courier New', monospace;
      font-size: 14px;
    }
    .cmd    { fill: #7dcfff; }
    .normal { fill: #c0caf5; }
    .green  { fill: #9ece6a; }
    .dim    { fill: #565f89; }
    .yellow { fill: #e0af68; }
    .white  { fill: #a9b1d6; }
    .bold   { fill: #c0caf5; font-weight: bold; }
  </style>

  <!-- Window chrome -->
  <rect width="800" height="540" rx="12" ry="12" fill="#1a1b26"/>
  <rect width="800" height="40" rx="12" ry="12" fill="#24283b"/>
  <rect y="28" width="800" height="12" fill="#24283b"/>
  <circle cx="24" cy="20" r="7" fill="#ff5f56"/>
  <circle cx="46" cy="20" r="7" fill="#ffbd2e"/>
  <circle cx="68" cy="20" r="7" fill="#27c93f"/>
  <text x="400" y="24" text-anchor="middle" fill="#565f89" font-size="13" font-family="Menlo, Monaco, monospace">Terminal</text>

  <!-- Terminal content -->
  <g transform="translate(28, 70)">
    <text class="line l1" y="0"><tspan class="dim">$</tspan><tspan class="cmd"> make doctor</tspan></text>

    <text class="line l2" y="40"><tspan class="bold">  CW Secure Template &#x2014; Health Check</tspan></text>
    <text class="line l3" y="64"><tspan class="dim">  ──────────────────────────────────</tspan></text>

    <text class="line l4"  y="100"><tspan class="white">  Pre-commit hooks     </tspan><tspan class="green">&#x2713; installed</tspan></text>
    <text class="line l5"  y="124"><tspan class="white">  Gitleaks             </tspan><tspan class="green">&#x2713; v8.18.0</tspan></text>
    <text class="line l6"  y="148"><tspan class="white">  Branch protection    </tspan><tspan class="green">&#x2713; enabled</tspan></text>
    <text class="line l7"  y="172"><tspan class="white">  .env.example         </tspan><tspan class="green">&#x2713; synced</tspan></text>
    <text class="line l8"  y="196"><tspan class="white">  CLAUDE.md            </tspan><tspan class="green">&#x2713; 15 rules active</tspan></text>
    <text class="line l9"  y="220"><tspan class="white">  CI pipeline          </tspan><tspan class="green">&#x2713; configured</tspan></text>
    <text class="line l10" y="244"><tspan class="white">  Test coverage        </tspan><tspan class="green">&#x2713; 87% (&#x2265;80% required)</tspan></text>
    <text class="line l11" y="268"><tspan class="white">  Security headers     </tspan><tspan class="green">&#x2713; all 5 present</tspan></text>

    <text class="line l12" y="308"><tspan class="dim">  ────────────────────────────────</tspan></text>
    <text class="line l13" y="332"><tspan class="green">  8/8 checks passed</tspan><tspan class="white"> &#x2014; ship it</tspan></text>
  </g>
</svg>