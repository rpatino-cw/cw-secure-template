<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560">
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .line { opacity: 0; animation: fadeIn 0.3s ease forwards; }
    .l1  { animation-delay: 0.3s; }
    .l2  { animation-delay: 0.7s; }
    .l3  { animation-delay: 1.0s; }
    .l4  { animation-delay: 1.3s; }
    .l5  { animation-delay: 1.7s; }
    .l6  { animation-delay: 2.0s; }
    .l7  { animation-delay: 2.3s; }
    .l8  { animation-delay: 2.7s; }
    .l9  { animation-delay: 3.0s; }
    .l10 { animation-delay: 3.3s; }
    .l11 { animation-delay: 3.6s; }
    .l12 { animation-delay: 4.0s; }
    text {
      font-family: Menlo, Monaco, 'Courier New', monospace;
      font-size: 14px;
    }
    .cmd    { fill: #7dcfff; }
    .normal { fill: #c0caf5; }
    .green  { fill: #9ece6a; }
    .dim    { fill: #565f89; }
    .yellow { fill: #e0af68; }
    .white  { fill: #a9b1d6; }
    .bold   { fill: #c0caf5; font-weight: bold; }
  </style>

  <!-- Window chrome -->
  <rect width="800" height="560" rx="12" ry="12" fill="#1a1b26"/>
  <rect width="800" height="40" rx="12" ry="12" fill="#24283b"/>
  <rect y="28" width="800" height="12" fill="#24283b"/>
  <circle cx="24" cy="20" r="7" fill="#ff5f56"/>
  <circle cx="46" cy="20" r="7" fill="#ffbd2e"/>
  <circle cx="68" cy="20" r="7" fill="#27c93f"/>
  <text x="400" y="24" text-anchor="middle" fill="#565f89" font-size="13" font-family="Menlo, Monaco, monospace">Terminal</text>

  <!-- Terminal content -->
  <g transform="translate(28, 70)">
    <text class="line l1" y="0"><tspan class="dim">$</tspan><tspan class="cmd"> make check</tspan></text>

    <text class="line l2" y="40"><tspan class="white">  Running lint...</tspan></text>
    <text class="line l3" y="64"><tspan class="green">  &#x2713; ruff check passed</tspan></text>
    <text class="line l4" y="88"><tspan class="green">  &#x2713; ruff format passed</tspan></text>

    <text class="line l5" y="128"><tspan class="white">  Running tests...</tspan></text>
    <text class="line l6" y="152"><tspan class="green">  &#x2713; 12 passed in 1.4s</tspan></text>
    <text class="line l7" y="176"><tspan class="green">  &#x2713; Coverage: 87% (&#x2265;80%)</tspan></text>

    <text class="line l8"  y="216"><tspan class="white">  Running security scan...</tspan></text>
    <text class="line l9"  y="240"><tspan class="green">  &#x2713; gitleaks: no secrets found</tspan></text>
    <text class="line l10" y="264"><tspan class="green">  &#x2713; bandit: no issues found</tspan></text>
    <text class="line l11" y="288"><tspan class="green">  &#x2713; pip-audit: 0 vulnerabilities</tspan></text>

    <text class="line l12" y="332"><tspan class="green">  All checks passed.</tspan><tspan class="white"> You're good to open a PR.</tspan></text>
  </g>
</svg>