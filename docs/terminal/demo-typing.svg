<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 520" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', Menlo, monospace" font-size="14">
  <style>
    .bg { fill: #0d1117; }
    .bar { fill: #161b22; }
    .dot-r { fill: #ff5f57; }
    .dot-y { fill: #febc2e; }
    .dot-g { fill: #28c840; }
    .title { fill: #8b949e; font-size: 13px; }
    .prompt { fill: #7ee787; }
    .cmd { fill: #e6edf3; }
    .dim { fill: #8b949e; }
    .out { fill: #58a6ff; }
    .warn { fill: #d29922; }
    .pass { fill: #3fb950; }
    .bold { fill: #f0f6fc; font-weight: bold; }
    @keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }
    .cursor { animation: blink 1s step-end infinite; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>

  <!-- Window -->
  <rect class="bg" width="840" height="520" rx="10"/>
  <rect class="bar" width="840" height="38" rx="10"/>
  <rect class="bg" x="0" y="28" width="840" height="10"/>
  <circle class="dot-r" cx="20" cy="19" r="6"/>
  <circle class="dot-y" cx="40" cy="19" r="6"/>
  <circle class="dot-g" cx="60" cy="19" r="6"/>
  <text class="title" x="420" y="23" text-anchor="middle">my-app --- zsh</text>

  <!-- Line 1: clone -->
  <g opacity="0">
    <text y="72" x="20"><tspan class="prompt">~ </tspan><tspan class="cmd">git clone cw-secure-template my-app</tspan></text>
    <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="1.8s" fill="freeze"/>
  </g>

  <!-- Line 2: output -->
  <g opacity="0">
    <text class="dim" y="96" x="20">Cloning into 'my-app'... done.</text>
    <animate attributeName="opacity" from="0" to="1" begin="3s" dur="0.3s" fill="freeze"/>
  </g>

  <!-- Line 3: cd + setup -->
  <g opacity="0">
    <text y="132" x="20"><tspan class="prompt">~ </tspan><tspan class="cmd">cd my-app &amp;&amp; bash setup.sh</tspan></text>
    <animate attributeName="opacity" from="0" to="1" begin="3.8s" dur="1.4s" fill="freeze"/>
  </g>

  <!-- Line 4-7: setup output -->
  <g opacity="0">
    <text class="out" y="168" x="20">Pick your language:</text>
    <animate attributeName="opacity" from="0" to="1" begin="5.6s" dur="0.3s" fill="freeze"/>
  </g>
  <g opacity="0">
    <text class="dim" y="192" x="20">  [1] Python (FastAPI)    [2] Go (net/http)</text>
    <animate attributeName="opacity" from="0" to="1" begin="6s" dur="0.3s" fill="freeze"/>
  </g>
  <g opacity="0">
    <text y="216" x="20"><tspan class="prompt">&gt; </tspan><tspan class="cmd">1</tspan></text>
    <animate attributeName="opacity" from="0" to="1" begin="7s" dur="0.5s" fill="freeze"/>
  </g>
  <g opacity="0">
    <text class="pass" y="252" x="20">&#10003; Python selected</text>
    <animate attributeName="opacity" from="0" to="1" begin="8s" dur="0.2s" fill="freeze"/>
  </g>
  <g opacity="0">
    <text class="pass" y="276" x="20">&#10003; .env created from template</text>
    <animate attributeName="opacity" from="0" to="1" begin="8.4s" dur="0.2s" fill="freeze"/>
  </g>
  <g opacity="0">
    <text class="pass" y="300" x="20">&#10003; Git hooks installed (pre-commit, pre-push)</text>
    <animate attributeName="opacity" from="0" to="1" begin="8.8s" dur="0.2s" fill="freeze"/>
  </g>
  <g opacity="0">
    <text class="pass" y="324" x="20">&#10003; Security pipeline active</text>
    <animate attributeName="opacity" from="0" to="1" begin="9.2s" dur="0.2s" fill="freeze"/>
  </g>
  <g opacity="0">
    <text class="pass" y="348" x="20">&#10003; Claude Code rules loaded (15 rules, 4 agents)</text>
    <animate attributeName="opacity" from="0" to="1" begin="9.6s" dur="0.2s" fill="freeze"/>
  </g>

  <!-- Ready message -->
  <g opacity="0">
    <text y="390" x="20"><tspan class="bold">Ready.</tspan><tspan class="dim">  Run </tspan><tspan class="cmd">make start</tspan><tspan class="dim"> to begin.</tspan></text>
    <animate attributeName="opacity" from="0" to="1" begin="10.4s" dur="0.4s" fill="freeze"/>
  </g>

  <!-- Line: make start -->
  <g opacity="0">
    <text y="426" x="20"><tspan class="prompt">my-app </tspan><tspan class="cmd">make start</tspan></text>
    <animate attributeName="opacity" from="0" to="1" begin="11.5s" dur="1s" fill="freeze"/>
  </g>

  <!-- Server output -->
  <g opacity="0">
    <text class="out" y="462" x="20">INFO:     Uvicorn running on http://localhost:8080</text>
    <animate attributeName="opacity" from="0" to="1" begin="13s" dur="0.3s" fill="freeze"/>
  </g>
  <g opacity="0">
    <text class="pass" y="486" x="20">INFO:     Auth: DEV_MODE  |  Rate limit: 100/min  |  Hooks: active</text>
    <animate attributeName="opacity" from="0" to="1" begin="13.5s" dur="0.3s" fill="freeze"/>
  </g>

  <!-- Blinking cursor at end -->
  <rect class="cursor" x="20" y="498" width="8" height="16" fill="#e6edf3" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="14s" dur="0.01s" fill="freeze"/>
  </rect>
</svg>
