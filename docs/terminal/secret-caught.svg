<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620">
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .line { opacity: 0; animation: fadeIn 0.3s ease forwards; }
    .l1  { animation-delay: 0.3s; }
    .l2  { animation-delay: 0.6s; }
    .l3  { animation-delay: 1.0s; }
    .l4  { animation-delay: 1.3s; }
    .l5  { animation-delay: 1.6s; }
    .l6  { animation-delay: 1.9s; }
    .l7  { animation-delay: 2.2s; }
    .l8  { animation-delay: 2.5s; }
    .l9  { animation-delay: 2.8s; }
    .l10 { animation-delay: 3.1s; }
    .l11 { animation-delay: 3.5s; }
    .l12 { animation-delay: 3.8s; }
    .l13 { animation-delay: 4.1s; }
    .l14 { animation-delay: 4.4s; }
    .l15 { animation-delay: 4.7s; }
    .l16 { animation-delay: 5.0s; }
    text {
      font-family: Menlo, Monaco, 'Courier New', monospace;
      font-size: 14px;
    }
    .cmd    { fill: #7dcfff; }
    .normal { fill: #c0caf5; }
    .green  { fill: #9ece6a; }
    .red    { fill: #f7768e; }
    .dim    { fill: #565f89; }
    .yellow { fill: #e0af68; }
    .white  { fill: #a9b1d6; }
    .bold   { fill: #c0caf5; font-weight: bold; }
  </style>

  <!-- Window chrome -->
  <rect width="800" height="620" rx="12" ry="12" fill="#1a1b26"/>
  <rect width="800" height="40" rx="12" ry="12" fill="#24283b"/>
  <rect y="28" width="800" height="12" fill="#24283b"/>
  <circle cx="24" cy="20" r="7" fill="#ff5f56"/>
  <circle cx="46" cy="20" r="7" fill="#ffbd2e"/>
  <circle cx="68" cy="20" r="7" fill="#27c93f"/>
  <text x="400" y="24" text-anchor="middle" fill="#565f89" font-size="13" font-family="Menlo, Monaco, monospace">Terminal</text>

  <!-- Terminal content -->
  <g transform="translate(28, 70)">
    <text class="line l1" y="0"><tspan class="dim">$</tspan><tspan class="cmd"> git commit -m "Add API integration"</tspan></text>

    <text class="line l2" y="36"><tspan class="white">  gitleaks</tspan><tspan class="dim"> ·························· </tspan><tspan class="red">FAILED</tspan></text>

    <text class="line l3" y="72"><tspan class="yellow">  &#x26a0; SECRET DETECTED</tspan></text>
    <text class="line l4" y="96"><tspan class="dim">  ─────────────────</tspan></text>
    <text class="line l5" y="120"><tspan class="white">  File:   </tspan><tspan class="cmd">src/main.py:14</tspan></text>
    <text class="line l6" y="144"><tspan class="white">  Type:   </tspan><tspan class="yellow">Generic API Key</tspan></text>
    <text class="line l7" y="168"><tspan class="white">  Match:  </tspan><tspan class="red">api_key = "sk-live-a]3x..."</tspan></text>

    <text class="line l8"  y="208"><tspan class="red">  &#x2717; Commit blocked.</tspan><tspan class="white"> Run:</tspan><tspan class="cmd"> make add-secret</tspan></text>

    <text class="line l9"  y="252"><tspan class="dim">$</tspan><tspan class="cmd"> make add-secret</tspan></text>
    <text class="line l10" y="276"><tspan class="white">  Variable name:</tspan><tspan class="cmd"> API_KEY</tspan></text>
    <text class="line l11" y="300"><tspan class="white">  Value:</tspan><tspan class="dim"> &#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;</tspan></text>
    <text class="line l12" y="324"><tspan class="green">  &#x2713; Added to .env (never touches git)</tspan></text>
  </g>
</svg>