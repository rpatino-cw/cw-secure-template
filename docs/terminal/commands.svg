<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 400" font-family="'SF Mono', 'Fira Code', Menlo, monospace" font-size="14">
  <style>
    .bg { fill: #0d1117; }
    .bar { fill: #161b22; }
    .dot-r { fill: #ff5f57; }
    .dot-y { fill: #febc2e; }
    .dot-g { fill: #28c840; }
    .title { fill: #8b949e; font-size: 13px; }
    .prompt { fill: #7ee787; }
    .cmd { fill: #e6edf3; }
    .dim { fill: #8b949e; }
    .out { fill: #58a6ff; }
    .pass { fill: #3fb950; }
    .bold { fill: #f0f6fc; font-weight: bold; }
    .label { fill: #d2a8ff; font-size: 12px; }
    @keyframes blink { 0%,50%{opacity:1} 51%,100%{opacity:0} }
    .cursor { animation: blink 1s step-end infinite; }
  </style>

  <rect class="bg" width="840" height="400" rx="10"/>
  <rect class="bar" width="840" height="38" rx="10"/>
  <rect class="bg" x="0" y="28" width="840" height="10"/>
  <circle class="dot-r" cx="20" cy="19" r="6"/>
  <circle class="dot-y" cx="40" cy="19" r="6"/>
  <circle class="dot-g" cx="60" cy="19" r="6"/>
  <text class="title" x="420" y="23" text-anchor="middle">The 3 commands you need</text>

  <!-- Command 1: make start -->
  <g opacity="0">
    <text y="72" x="20"><tspan class="prompt">my-app </tspan><tspan class="cmd">make start</tspan></text>
    <text class="label" y="72" x="580">run your app</text>
    <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.8s" fill="freeze"/>
  </g>
  <g opacity="0">
    <text class="pass" y="96" x="40">&#10003; Server running on http://localhost:8080</text>
    <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.3s" fill="freeze"/>
  </g>

  <!-- Command 2: make check -->
  <g opacity="0">
    <text y="140" x="20"><tspan class="prompt">my-app </tspan><tspan class="cmd">make check</tspan></text>
    <text class="label" y="140" x="580">check before PR</text>
    <animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.8s" fill="freeze"/>
  </g>
  <g opacity="0">
    <text class="pass" y="164" x="40">&#10003; Lint passed</text>
    <animate attributeName="opacity" from="0" to="1" begin="4s" dur="0.2s" fill="freeze"/>
  </g>
  <g opacity="0">
    <text class="pass" y="184" x="40">&#10003; Tests passed (87% coverage)</text>
    <animate attributeName="opacity" from="0" to="1" begin="4.4s" dur="0.2s" fill="freeze"/>
  </g>
  <g opacity="0">
    <text class="pass" y="204" x="40">&#10003; No secrets found</text>
    <animate attributeName="opacity" from="0" to="1" begin="4.8s" dur="0.2s" fill="freeze"/>
  </g>
  <g opacity="0">
    <text class="pass" y="224" x="40">&#10003; Safe to push</text>
    <animate attributeName="opacity" from="0" to="1" begin="5.2s" dur="0.2s" fill="freeze"/>
  </g>

  <!-- Command 3: make add-secret -->
  <g opacity="0">
    <text y="268" x="20"><tspan class="prompt">my-app </tspan><tspan class="cmd">make add-secret</tspan></text>
    <text class="label" y="268" x="580">store a password safely</text>
    <animate attributeName="opacity" from="0" to="1" begin="6s" dur="0.8s" fill="freeze"/>
  </g>
  <g opacity="0">
    <text class="out" y="292" x="40">Variable name: DATABASE_URL</text>
    <animate attributeName="opacity" from="0" to="1" begin="7.2s" dur="0.3s" fill="freeze"/>
  </g>
  <g opacity="0">
    <text class="out" y="312" x="40">Value: ********** (hidden)</text>
    <animate attributeName="opacity" from="0" to="1" begin="8s" dur="0.3s" fill="freeze"/>
  </g>
  <g opacity="0">
    <text class="pass" y="336" x="40">&#10003; Saved to .env (never in code, never in git)</text>
    <animate attributeName="opacity" from="0" to="1" begin="8.8s" dur="0.3s" fill="freeze"/>
  </g>

  <!-- Final cursor -->
  <g opacity="0">
    <text class="bold" y="372" x="20">That's it. Three commands.</text>
    <animate attributeName="opacity" from="0" to="1" begin="9.6s" dur="0.4s" fill="freeze"/>
  </g>
</svg>
