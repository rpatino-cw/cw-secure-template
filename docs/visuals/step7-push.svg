<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 110" fill="none">
  <style>
    @keyframes p1 { 0%,100%{opacity:0} 5%,30%{opacity:1} }
    @keyframes p2 { 0%,30%{opacity:0} 40%,70%{opacity:1} }
    @keyframes p3 { 0%,70%{opacity:0} 80%,95%{opacity:1} }
    text { font-family: 'Menlo','Consolas',monospace; }
  </style>
  <rect width="600" height="110" rx="12" fill="#1e1b2e"/>
  <circle cx="18" cy="14" r="5" fill="#f87171"/><circle cx="34" cy="14" r="5" fill="#fbbf24"/><circle cx="50" cy="14" r="5" fill="#4ade80"/>
  <g style="animation:p1 6s ease infinite">
    <text x="16" y="48" font-size="13" fill="#a78bfa">$</text>
    <text x="30" y="48" font-size="13" fill="#e2e8f0">git push</text>
  </g>
  <g style="animation:p2 6s ease infinite">
    <text x="16" y="74" font-size="12" fill="#94a3b8">  Running tests before push...</text>
    <text x="16" y="92" font-size="12" fill="#4ade80">  11 passed in 1.2s</text>
  </g>
  <g style="animation:p3 6s ease infinite">
    <text x="250" y="92" font-size="12" fill="#4ade80">  Pushing to GitHub...</text>
  </g>
</svg>
