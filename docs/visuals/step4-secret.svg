<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150" fill="none">
  <style>
    @keyframes s1 { 0%,100%{opacity:0} 5%,25%{opacity:1} }
    @keyframes s2 { 0%,25%{opacity:0} 30%,55%{opacity:1} }
    @keyframes s3 { 0%,55%{opacity:0} 60%,95%{opacity:1} }
    text { font-family: 'Menlo','Consolas',monospace; }
  </style>
  <rect width="600" height="150" rx="12" fill="#1e1b2e"/>
  <circle cx="18" cy="14" r="5" fill="#f87171"/><circle cx="34" cy="14" r="5" fill="#fbbf24"/><circle cx="50" cy="14" r="5" fill="#4ade80"/>
  <g style="animation:s1 7s ease infinite">
    <text x="16" y="48" font-size="13" fill="#a78bfa">$</text>
    <text x="30" y="48" font-size="13" fill="#e2e8f0">make add-secret</text>
  </g>
  <g style="animation:s2 7s ease infinite">
    <text x="16" y="74" font-size="12" fill="#94a3b8">  Variable name: </text>
    <text x="168" y="74" font-size="12" fill="#e2e8f0">STRIPE_KEY</text>
    <text x="16" y="96" font-size="12" fill="#94a3b8">  Paste value (hidden): </text>
    <text x="228" y="96" font-size="12" fill="#64748b">**********</text>
  </g>
  <g style="animation:s3 7s ease infinite">
    <text x="16" y="122" font-size="12" fill="#4ade80">  Done. STRIPE_KEY stored in .env</text>
    <text x="16" y="142" font-size="11" fill="#60a5fa">  Use: os.environ["STRIPE_KEY"]</text>
  </g>
</svg>
