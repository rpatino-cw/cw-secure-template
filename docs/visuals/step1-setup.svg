<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" fill="none">
  <style>
    @keyframes t1 { 0%,100%{opacity:0} 5%,30%{opacity:1} }
    @keyframes t2 { 0%,30%{opacity:0} 35%,60%{opacity:1} }
    @keyframes t3 { 0%,60%{opacity:0} 65%,95%{opacity:1} }
    text { font-family: 'Menlo','Consolas',monospace; }
  </style>
  <rect width="600" height="160" rx="12" fill="#1e1b2e"/>
  <circle cx="18" cy="14" r="5" fill="#f87171"/><circle cx="34" cy="14" r="5" fill="#fbbf24"/><circle cx="50" cy="14" r="5" fill="#4ade80"/>
  <g style="animation:t1 8s ease infinite">
    <text x="16" y="50" font-size="13" fill="#a78bfa">$</text>
    <text x="30" y="50" font-size="13" fill="#e2e8f0">git clone https://github.com/.../cw-secure-template my-app</text>
  </g>
  <g style="animation:t2 8s ease infinite">
    <text x="16" y="80" font-size="13" fill="#a78bfa">$</text>
    <text x="30" y="80" font-size="13" fill="#e2e8f0">cd my-app</text>
  </g>
  <g style="animation:t3 8s ease infinite">
    <text x="16" y="110" font-size="13" fill="#a78bfa">$</text>
    <text x="30" y="110" font-size="13" fill="#e2e8f0">bash setup.sh</text>
    <text x="16" y="138" font-size="12" fill="#4ade80">  Setup complete! Security hooks installed.</text>
  </g>
</svg>
