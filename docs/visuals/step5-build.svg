<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" fill="none">
  <style>
    @keyframes b1 { 0%,100%{opacity:0} 5%,20%{opacity:1} }
    @keyframes b2 { 0%,20%{opacity:0} 25%,50%{opacity:1} }
    @keyframes b3 { 0%,50%{opacity:0} 55%,95%{opacity:1} }
    text { font-family: 'Menlo','Consolas',monospace; }
  </style>
  <rect width="600" height="160" rx="12" fill="#1e1b2e"/>
  <circle cx="18" cy="14" r="5" fill="#f87171"/><circle cx="34" cy="14" r="5" fill="#fbbf24"/><circle cx="50" cy="14" r="5" fill="#4ade80"/>
  <g style="animation:b1 8s ease infinite">
    <text x="16" y="48" font-size="12" fill="#94a3b8">  You type in Claude:</text>
    <text x="16" y="68" font-size="13" fill="#fbbf24">  "Add an endpoint that returns my team members"</text>
  </g>
  <g style="animation:b2 8s ease infinite">
    <text x="16" y="94" font-size="12" fill="#60a5fa">  Claude reads CLAUDE.md... applying 15 security rules</text>
  </g>
  <g style="animation:b3 8s ease infinite">
    <text x="16" y="116" font-size="12" fill="#4ade80">  + GET /api/team with Depends(get_current_user)</text>
    <text x="16" y="134" font-size="12" fill="#4ade80">  + Pydantic model with strict validation</text>
    <text x="16" y="152" font-size="12" fill="#4ade80">  + 3 tests (happy path, 401, 422)</text>
  </g>
</svg>
