<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150" fill="none">
  <style>
    @keyframes c1 { 0%,100%{opacity:0} 5%,20%{opacity:1} }
    @keyframes c2 { 0%,20%{opacity:0} 25%,40%{opacity:1} }
    @keyframes c3 { 0%,40%{opacity:0} 45%,60%{opacity:1} }
    @keyframes c4 { 0%,60%{opacity:0} 65%,95%{opacity:1} }
    text { font-family: 'Menlo','Consolas',monospace; }
  </style>
  <rect width="600" height="150" rx="12" fill="#1e1b2e"/>
  <circle cx="18" cy="14" r="5" fill="#f87171"/><circle cx="34" cy="14" r="5" fill="#fbbf24"/><circle cx="50" cy="14" r="5" fill="#4ade80"/>
  <g style="animation:c1 7s ease infinite">
    <text x="16" y="48" font-size="13" fill="#a78bfa">$</text>
    <text x="30" y="48" font-size="13" fill="#e2e8f0">git commit -m "Add team endpoint"</text>
  </g>
  <g style="animation:c2 7s ease infinite">
    <text x="16" y="74" font-size="12" fill="#94a3b8">  Checking your code...</text>
  </g>
  <g style="animation:c3 7s ease infinite">
    <text x="16" y="96" font-size="12" fill="#4ade80">  gitleaks..........passed</text>
    <text x="16" y="114" font-size="12" fill="#4ade80">  ruff..............passed</text>
    <text x="16" y="132" font-size="12" fill="#4ade80">  bandit............passed</text>
  </g>
  <g style="animation:c4 7s ease infinite">
    <text x="320" y="96" font-size="12" fill="#4ade80">  No secrets</text>
    <text x="320" y="114" font-size="12" fill="#4ade80">  Clean code</text>
    <text x="320" y="132" font-size="12" fill="#4ade80">  No vulns</text>
  </g>
</svg>
