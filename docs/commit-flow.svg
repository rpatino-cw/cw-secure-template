<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 120" fill="none">
  <style>
    @keyframes check1 { 0%,20%{opacity:0;transform:scale(0)} 30%,100%{opacity:1;transform:scale(1)} }
    @keyframes check2 { 0%,40%{opacity:0;transform:scale(0)} 50%,100%{opacity:1;transform:scale(1)} }
    @keyframes check3 { 0%,60%{opacity:0;transform:scale(0)} 70%,100%{opacity:1;transform:scale(1)} }
    @keyframes check4 { 0%,80%{opacity:0;transform:scale(0)} 90%,100%{opacity:1;transform:scale(1)} }
    @keyframes flowDot { 0%{cx:55} 25%{cx:210} 50%{cx:380} 75%{cx:540} 100%{cx:670} }
    @keyframes flowFade { 0%,90%{opacity:.7} 95%,100%{opacity:0} }
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>

  <rect width="700" height="120" rx="14" fill="#f0f9ff"/>
  <rect width="700" height="120" rx="14" fill="none" stroke="#bae6fd" stroke-width="1"/>

  <!-- Connection line -->
  <line x1="90" y1="50" x2="640" y2="50" stroke="#93c5fd" stroke-width="2" stroke-dasharray="5 4"/>

  <!-- Flowing dot -->
  <circle r="5" cy="50" fill="#3b82f6" style="animation: flowDot 5s ease-in-out infinite, flowFade 5s ease infinite">
    <animate attributeName="cx" values="55;210;380;540;670" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Stage 1: git commit -->
  <rect x="16" y="25" width="80" height="50" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="56" y="47" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">git commit</text>
  <text x="56" y="61" text-anchor="middle" font-size="9" fill="#3b82f6">your code</text>

  <!-- Stage 2: Secret scan -->
  <rect x="140" y="25" width="120" height="50" rx="8" fill="#fefce8" stroke="#fde68a" stroke-width="1"/>
  <text x="200" y="47" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Secret Scan</text>
  <text x="200" y="61" text-anchor="middle" font-size="9" fill="#a16207">no passwords?</text>
  <g style="animation: check1 5s ease infinite">
    <circle cx="248" cy="30" r="9" fill="#22c55e"/>
    <text x="248" y="34" text-anchor="middle" font-size="11" fill="white" font-weight="700">&#10003;</text>
  </g>

  <!-- Stage 3: Lint -->
  <rect x="310" y="25" width="110" height="50" rx="8" fill="#fefce8" stroke="#fde68a" stroke-width="1"/>
  <text x="365" y="47" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Code Check</text>
  <text x="365" y="61" text-anchor="middle" font-size="9" fill="#a16207">clean code?</text>
  <g style="animation: check2 5s ease infinite">
    <circle cx="408" cy="30" r="9" fill="#22c55e"/>
    <text x="408" y="34" text-anchor="middle" font-size="11" fill="white" font-weight="700">&#10003;</text>
  </g>

  <!-- Stage 4: Tests (pre-push) -->
  <rect x="470" y="25" width="110" height="50" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="525" y="47" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">Tests</text>
  <text x="525" y="61" text-anchor="middle" font-size="9" fill="#16a34a">all passing?</text>
  <g style="animation: check3 5s ease infinite">
    <circle cx="568" cy="30" r="9" fill="#22c55e"/>
    <text x="568" y="34" text-anchor="middle" font-size="11" fill="white" font-weight="700">&#10003;</text>
  </g>

  <!-- Stage 5: Pushed -->
  <rect x="620" y="25" width="65" height="50" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="652" y="47" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">Pushed</text>
  <g style="animation: check4 5s ease infinite">
    <circle cx="672" cy="30" r="9" fill="#22c55e"/>
    <text x="672" y="34" text-anchor="middle" font-size="11" fill="white" font-weight="700">&#10003;</text>
  </g>

  <!-- Bottom label -->
  <text x="350" y="105" text-anchor="middle" font-size="11" fill="#6b7280">Every commit and push is checked automatically. You just write code.</text>
</svg>
