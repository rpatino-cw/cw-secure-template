<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guardrails</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:#08080f;font-family:'JetBrains Mono',monospace}
canvas{display:block;width:100vw;height:100vh}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const C = document.getElementById('c');
const X = C.getContext('2d');
const DPR = Math.min(devicePixelRatio || 1, 2);
let W, H;

// Guardrail labels — 3 per side
const LABELS_L = ['CLAUDE.md', 'Pre-commit Hooks', 'CI Pipeline'];
const LABELS_R = ['Smart Rules', 'Coverage Gate', 'Branch Protection'];
const SUBS_L = ['15 rules enforced', 'secrets blocked', 'CodeQL + SAST'];
const SUBS_R = ['auto-applied', '80% minimum', 'review required'];

// Layout
let laneX, laneW, laneTop, laneBot, railW;

function resize() {
  W = innerWidth; H = innerHeight;
  C.width = W * DPR; C.height = H * DPR;
  X.setTransform(DPR, 0, 0, DPR, 0, 0);
  laneW = Math.min(W * 0.36, 260);
  laneX = (W - laneW) / 2;
  laneTop = H * 0.11;
  laneBot = H * 0.89;
  railW = Math.max(6, laneW * 0.035);
}
resize();

// State
let ball, trail, sparks, railHits, shakeX, shakeY, phase, timer, runCount = 0;

const PROMPTS = [
  '"just hardcode the key for now"',
  '"skip auth, ship it fast"',
  '"use eval() to parse this"',
  '"push straight to main"',
  '"disable CORS so it works"',
  '"store the password in plaintext"',
];

function init() {
  const chaos = 3 + Math.random() * 4; // how wild the throw is
  const dir = Math.random() > 0.5 ? 1 : -1;
  ball = {
    x: laneX + laneW / 2 + (Math.random() - 0.5) * laneW * 0.5,
    y: laneTop - 10,
    vx: dir * chaos,
    vy: 0.6 + Math.random() * 0.4,
    r: Math.min(laneW * 0.055, 9),
    gravity: 0.012 + Math.random() * 0.008,
    chaos: 0.06 + Math.random() * 0.04, // random force magnitude
    friction: 0.998,
    alive: true
  };
  trail = [];
  sparks = [];
  railHits = {}; // 'L0' -> flash value
  shakeX = 0; shakeY = 0;
  phase = 'rolling';
  timer = 0;
}

function spawnSparks(x, y, nx, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.atan2(0, nx) + (Math.random() - 0.5) * 1.8;
    const speed = 2 + Math.random() * 5;
    sparks.push({
      x, y, vx: Math.cos(angle) * speed * nx, vy: -1 + Math.random() * 2,
      life: 1, decay: 0.02 + Math.random() * 0.04,
      size: 1 + Math.random() * 3
    });
  }
}

function tick() {
  timer++;
  if (phase === 'done') {
    shakeX *= 0.9; shakeY *= 0.9;
    if (timer > 200) { runCount++; init(); }
    // Fade sparks
    sparks.forEach(s => { s.x += s.vx; s.y += s.vy; s.vx *= 0.95; s.vy *= 0.95; s.life -= s.decay; });
    sparks = sparks.filter(s => s.life > 0);
    Object.keys(railHits).forEach(k => railHits[k] *= 0.94);
    return;
  }

  // Random chaotic force — the prompt is MESSY
  ball.vx += (Math.random() - 0.5) * ball.chaos * 2;
  // Occasional big shove (prompt really trying to escape)
  if (Math.random() < 0.03) {
    ball.vx += (Math.random() - 0.5) * 3;
  }

  ball.vy += ball.gravity;
  ball.vx *= ball.friction;
  ball.x += ball.vx;
  ball.y += ball.vy;

  // Trail
  trail.push({ x: ball.x, y: ball.y, vx: ball.vx });
  if (trail.length > 600) trail.shift();

  // LEFT WALL COLLISION
  const leftEdge = laneX + railW + ball.r;
  if (ball.x < leftEdge) {
    ball.x = leftEdge;
    const impact = Math.abs(ball.vx);
    ball.vx = Math.abs(ball.vx) * (0.75 + Math.random() * 0.2);
    // Add upward/downward deflection from impact
    ball.vy += (Math.random() - 0.4) * impact * 0.3;

    // Which segment?
    const segH = (laneBot - laneTop) / 3;
    const seg = Math.min(2, Math.max(0, Math.floor((ball.y - laneTop) / segH)));
    const key = 'L' + seg;
    railHits[key] = Math.min(1, (railHits[key] || 0) + 0.4 + impact * 0.15);

    // Sparks fly RIGHT (away from left wall)
    spawnSparks(ball.x, ball.y, 1, Math.floor(4 + impact * 4));

    // Screen shake proportional to impact
    shakeX = impact * 1.5 * (Math.random() > 0.5 ? 1 : -1);
    shakeY = (Math.random() - 0.5) * impact;
  }

  // RIGHT WALL COLLISION
  const rightEdge = laneX + laneW - railW - ball.r;
  if (ball.x > rightEdge) {
    ball.x = rightEdge;
    const impact = Math.abs(ball.vx);
    ball.vx = -Math.abs(ball.vx) * (0.75 + Math.random() * 0.2);
    ball.vy += (Math.random() - 0.4) * impact * 0.3;

    const segH = (laneBot - laneTop) / 3;
    const seg = Math.min(2, Math.max(0, Math.floor((ball.y - laneTop) / segH)));
    const key = 'R' + seg;
    railHits[key] = Math.min(1, (railHits[key] || 0) + 0.4 + impact * 0.15);

    spawnSparks(ball.x, ball.y, -1, Math.floor(4 + impact * 4));
    shakeX = -impact * 1.5 * (Math.random() > 0.5 ? 1 : -1);
    shakeY = (Math.random() - 0.5) * impact;
  }

  // Decay shake
  shakeX *= 0.85;
  shakeY *= 0.85;

  // Decay rail hits
  Object.keys(railHits).forEach(k => railHits[k] *= 0.97);

  // Sparks physics
  sparks.forEach(s => {
    s.x += s.vx; s.y += s.vy;
    s.vy += 0.05; // gravity on sparks
    s.vx *= 0.97; s.vy *= 0.97;
    s.life -= s.decay;
  });
  sparks = sparks.filter(s => s.life > 0);

  // Arrived?
  if (ball.y >= laneBot - 20) {
    phase = 'done';
    timer = 0;
    ball.alive = false;
    // Big spark burst
    for (let i = 0; i < 40; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 6;
      sparks.push({
        x: ball.x, y: ball.y,
        vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
        life: 1, decay: 0.01 + Math.random() * 0.02, size: 1 + Math.random() * 3
      });
    }
  }
}

function draw() {
  X.save();
  X.clearRect(0, 0, W, H);
  X.translate(shakeX, shakeY);

  // Lane bg
  X.fillStyle = '#0b0c16';
  X.beginPath();
  X.roundRect(laneX, laneTop, laneW, laneBot - laneTop, 10);
  X.fill();

  // Lane texture lines
  X.strokeStyle = '#0f1020';
  X.lineWidth = 1;
  for (let i = 1; i < 5; i++) {
    const x = laneX + (laneW / 5) * i;
    X.beginPath(); X.moveTo(x, laneTop + 8); X.lineTo(x, laneBot - 8); X.stroke();
  }

  // Rails — LEFT
  const segH = (laneBot - laneTop) / 3;
  for (let i = 0; i < 3; i++) {
    const y = laneTop + segH * i;
    const flash = railHits['L' + i] || 0;
    const r = Math.round(94 + flash * 100);
    const g = Math.round(234);
    const b = Math.round(212);

    // Rail body
    X.fillStyle = flash > 0.05
      ? `rgba(${r},${g},${b},${0.2 + flash * 0.8})`
      : '#181c30';
    X.beginPath();
    X.roundRect(laneX, y, railW, segH, [6, 0, 0, 6]);
    X.fill();

    // Glow
    if (flash > 0.05) {
      X.shadowColor = `rgb(${r},${g},${b})`;
      X.shadowBlur = 25 * flash;
      X.fillStyle = `rgba(${r},${g},${b},${flash * 0.15})`;
      X.beginPath();
      X.roundRect(laneX - 4, y, railW + 8, segH, 6);
      X.fill();
      X.shadowBlur = 0;
    }

    // Label
    const ly = y + segH / 2;
    const labelAlpha = 0.2 + flash * 0.8;
    X.fillStyle = flash > 0.2
      ? `rgba(94,234,212,${labelAlpha})`
      : `rgba(58,61,82,${0.5 + flash})`;
    X.font = `600 ${Math.max(9, Math.min(12, W * 0.016))}px "JetBrains Mono", monospace`;
    X.textAlign = 'right';
    X.fillText(LABELS_L[i], laneX - 12, ly - 2);
    X.font = `400 ${Math.max(8, Math.min(10, W * 0.013))}px "JetBrains Mono", monospace`;
    X.fillStyle = flash > 0.2
      ? `rgba(94,234,212,${labelAlpha * 0.5})`
      : 'rgba(58,61,82,0.35)';
    X.fillText(SUBS_L[i], laneX - 12, ly + 12);
  }

  // Rails — RIGHT
  for (let i = 0; i < 3; i++) {
    const y = laneTop + segH * i;
    const flash = railHits['R' + i] || 0;
    const r = Math.round(94 + flash * 100);
    const g = 234;
    const b = 212;

    X.fillStyle = flash > 0.05
      ? `rgba(${r},${g},${b},${0.2 + flash * 0.8})`
      : '#181c30';
    X.beginPath();
    X.roundRect(laneX + laneW - railW, y, railW, segH, [0, 6, 6, 0]);
    X.fill();

    if (flash > 0.05) {
      X.shadowColor = `rgb(${r},${g},${b})`;
      X.shadowBlur = 25 * flash;
      X.fillStyle = `rgba(${r},${g},${b},${flash * 0.15})`;
      X.beginPath();
      X.roundRect(laneX + laneW - railW - 4, y, railW + 8, segH, 6);
      X.fill();
      X.shadowBlur = 0;
    }

    const ly = y + segH / 2;
    const labelAlpha = 0.2 + flash * 0.8;
    X.fillStyle = flash > 0.2
      ? `rgba(94,234,212,${labelAlpha})`
      : `rgba(58,61,82,${0.5 + flash})`;
    X.font = `600 ${Math.max(9, Math.min(12, W * 0.016))}px "JetBrains Mono", monospace`;
    X.textAlign = 'left';
    X.fillText(LABELS_R[i], laneX + laneW + 12, ly - 2);
    X.font = `400 ${Math.max(8, Math.min(10, W * 0.013))}px "JetBrains Mono", monospace`;
    X.fillStyle = flash > 0.2
      ? `rgba(94,234,212,${labelAlpha * 0.5})`
      : 'rgba(58,61,82,0.35)';
    X.fillText(SUBS_R[i], laneX + laneW + 12, ly + 12);
  }

  // Trail — zigzag path showing the chaos
  if (trail.length > 2) {
    for (let i = 2; i < trail.length; i++) {
      const t = trail[i], prev = trail[i - 1];
      const age = (trail.length - i) / trail.length;
      const alpha = (1 - age) * 0.45;
      // Color: red at top (messy) → teal at bottom (corrected)
      const progress = Math.min(1, (t.y - laneTop) / (laneBot - laneTop));
      const cr = Math.round(247 - progress * 153);
      const cg = Math.round(118 + progress * 116);
      const cb = Math.round(142 + progress * 70);
      X.strokeStyle = `rgba(${cr},${cg},${cb},${alpha})`;
      X.lineWidth = 1.5 + (1 - age) * 1.5;
      X.beginPath();
      X.moveTo(prev.x, prev.y);
      X.lineTo(t.x, t.y);
      X.stroke();
    }
  }

  // Sparks
  sparks.forEach(s => {
    X.globalAlpha = s.life * 0.7;
    X.fillStyle = '#5eead4';
    X.beginPath();
    X.arc(s.x, s.y, s.size * s.life, 0, Math.PI * 2);
    X.fill();
  });
  X.globalAlpha = 1;

  // Ball
  if (ball.alive) {
    const progress = Math.min(1, Math.max(0, (ball.y - laneTop) / (laneBot - laneTop)));
    const br = Math.round(255 - progress * 15);
    const bg = Math.round(240 + progress * 4);
    const bb = Math.round(245 + progress * 10);

    // Outer glow
    X.shadowColor = progress < 0.3 ? '#f7768e' : progress < 0.7 ? '#e0af68' : '#5eead4';
    X.shadowBlur = 16 + Math.abs(ball.vx) * 2;
    X.fillStyle = `rgb(${br},${bg},${bb})`;
    X.beginPath();
    X.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    X.fill();
    X.shadowBlur = 0;

    // Highlight
    const grad = X.createRadialGradient(ball.x - ball.r * 0.3, ball.y - ball.r * 0.3, 0, ball.x, ball.y, ball.r);
    grad.addColorStop(0, 'rgba(255,255,255,0.5)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    X.fillStyle = grad;
    X.beginPath();
    X.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    X.fill();

    // Velocity streak behind ball
    if (Math.abs(ball.vx) > 1) {
      X.strokeStyle = `rgba(240,244,255,${Math.min(0.3, Math.abs(ball.vx) * 0.05)})`;
      X.lineWidth = ball.r * 1.2;
      X.lineCap = 'round';
      X.beginPath();
      X.moveTo(ball.x, ball.y);
      X.lineTo(ball.x - ball.vx * 3, ball.y - ball.vy * 2);
      X.stroke();
      X.lineCap = 'butt';
    }
  }

  // Top label — messy prompt
  X.textAlign = 'center';
  const prompt = PROMPTS[runCount % PROMPTS.length];
  X.fillStyle = phase === 'done' ? 'rgba(247,118,142,0.15)' : '#f7768e';
  X.font = `700 ${Math.max(11, Math.min(16, W * 0.022))}px "Syne", sans-serif`;
  X.fillText('MESSY PROMPT', W / 2, laneTop - 24);
  X.fillStyle = phase === 'done' ? 'rgba(247,118,142,0.08)' : 'rgba(247,118,142,0.45)';
  X.font = `500 ${Math.max(9, Math.min(12, W * 0.016))}px "JetBrains Mono", monospace`;
  X.fillText(prompt, W / 2, laneTop - 8);

  // Bottom label — secure code
  const arrived = phase === 'done';
  const pulse = arrived ? 0.6 + Math.sin(timer * 0.05) * 0.4 : 0.12;
  // Target zone
  X.fillStyle = `rgba(94,234,212,${pulse * 0.1})`;
  X.beginPath();
  X.roundRect(laneX + 4, laneBot - 4, laneW - 8, 12, 4);
  X.fill();

  X.fillStyle = arrived ? `rgba(94,234,212,${pulse})` : 'rgba(94,234,212,0.15)';
  X.font = `800 ${Math.max(11, Math.min(16, W * 0.022))}px "Syne", sans-serif`;
  X.fillText('SECURE CODE', W / 2, laneBot + 26);
  if (arrived) {
    X.shadowColor = '#5eead4';
    X.shadowBlur = 20 * pulse;
    X.fillText('SECURE CODE', W / 2, laneBot + 26);
    X.shadowBlur = 0;
  }

  X.restore();
}

function loop() { tick(); draw(); requestAnimationFrame(loop); }

C.addEventListener('click', () => { runCount++; init(); });
addEventListener('resize', () => { resize(); init(); });
init();
loop();
</script>
</body>
</html>
