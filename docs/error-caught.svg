<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" fill="none">
  <style>
    @keyframes typeIn { from{width:0} to{width:260px} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 10%,30%,50%{transform:translateX(-4px)} 20%,40%{transform:translateX(4px)} 60%{transform:translateX(0)} }
    @keyframes fadeIn1 { 0%,30%{opacity:0} 40%,100%{opacity:1} }
    @keyframes fadeIn2 { 0%,45%{opacity:0} 55%,100%{opacity:1} }
    @keyframes fadeIn3 { 0%,55%{opacity:0} 65%,100%{opacity:1} }
    @keyframes fadeIn4 { 0%,65%{opacity:0} 75%,100%{opacity:1} }
    @keyframes fadeIn5 { 0%,78%{opacity:0} 88%,100%{opacity:1} }
    @keyframes blockPulse { 0%,25%{opacity:0;transform:scale(.9)} 35%,90%{opacity:1;transform:scale(1)} 100%{opacity:0} }
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .mono { font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; }
  </style>

  <!-- Terminal background -->
  <rect width="700" height="220" rx="14" fill="#1e1b2e"/>
  <rect width="700" height="220" rx="14" fill="none" stroke="#2d2640" stroke-width="1"/>

  <!-- Terminal dots -->
  <circle cx="22" cy="16" r="5" fill="#f87171"/>
  <circle cx="38" cy="16" r="5" fill="#fbbf24"/>
  <circle cx="54" cy="16" r="5" fill="#4ade80"/>

  <!-- Command line -->
  <text x="20" y="50" class="mono" font-size="12" fill="#a78bfa">$</text>
  <text x="34" y="50" class="mono" font-size="12" fill="#e2e8f0">git commit -m "add user endpoint"</text>

  <!-- Checking line -->
  <text x="20" y="72" class="mono" font-size="11" fill="#64748b" style="animation: fadeIn1 8s ease infinite">  Checking your code before commit...</text>

  <!-- STOP block -->
  <g style="animation: blockPulse 8s ease infinite">
    <rect x="20" y="86" width="660" height="28" rx="4" fill="#451a1a"/>
    <text x="30" y="105" class="mono" font-size="13" font-weight="700" fill="#f87171">  STOP — You accidentally put a password in your code.</text>
  </g>

  <!-- Plain English explanation -->
  <g style="animation: fadeIn2 8s ease infinite">
    <text x="20" y="135" class="mono" font-size="11" fill="#94a3b8">  What happened:</text>
    <text x="155" y="135" class="mono" font-size="11" fill="#e2e8f0">A secret (API key) was found in src/config.py</text>
  </g>

  <g style="animation: fadeIn3 8s ease infinite">
    <text x="20" y="155" class="mono" font-size="11" fill="#94a3b8">  Why it matters:</text>
    <text x="155" y="155" class="mono" font-size="11" fill="#e2e8f0">If this reaches GitHub, anyone can see it — forever.</text>
  </g>

  <g style="animation: fadeIn4 8s ease infinite">
    <text x="20" y="175" class="mono" font-size="11" fill="#94a3b8">  How to fix it:</text>
    <text x="155" y="175" class="mono" font-size="11" fill="#4ade80">Replace the value with os.environ["API_KEY"]</text>
  </g>

  <g style="animation: fadeIn5 8s ease infinite">
    <text x="155" y="195" class="mono" font-size="11" fill="#4ade80">Add API_KEY=your-value to .env, then commit again.</text>
  </g>

  <!-- Bottom label (outside terminal) -->
  <text x="350" y="215" text-anchor="middle" font-size="0" fill="transparent">.</text>
</svg>
